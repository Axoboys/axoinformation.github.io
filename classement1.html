<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>/classement — AciBot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  
  
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --text: #e2e8f0;
      --muted: #64748b;
      --glow: rgba(124,58,237,0.3);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content:'';
      position:fixed;
      inset:0;
      background-image:
        linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
        linear-gradient(90deg,rgba(124,58,237,0.04) 1px,transparent 1px);
      background-size:40px 40px;
      pointer-events:none;
      z-index:0;
    }
    nav {
      position:sticky;
      top:0;
      z-index:100;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 2rem;
      height:60px;
      background:rgba(10,10,15,0.85);
      backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
    }
    .nav-logo {
      font-size:1.1rem;
      font-weight:800;
      letter-spacing:0.1em;
      color:var(--text);
      text-decoration:none;
    }
    .nav-logo span { color:var(--accent); }
    .nav-back {
      font-family:'Space Mono',monospace;
      font-size:0.8rem;
      color:var(--muted);
      text-decoration:none;
      display:flex;
      align-items:center;
      gap:0.5rem;
      transition:color 0.2s;
    }
    .nav-back:hover { color:var(--accent2); }
    main {
      position:relative;
      z-index:1;
      max-width:1100px;
      margin:0 auto;
      padding:3rem 2rem;
    }
    .page-header {
      margin-bottom:3rem;
    }
    .page-label {
      font-family:'Space Mono',monospace;
      font-size:0.75rem;
      color:var(--accent);
      letter-spacing:0.2em;
      text-transform:uppercase;
      margin-bottom:0.75rem;
    }
    .page-title {
      font-size:clamp(2.5rem,6vw,5rem);
      font-weight:800;
      line-height:1;
      margin-bottom:1rem;
    }
    .page-desc {
      font-family:'Space Mono',monospace;
      font-size:0.85rem;
      color:var(--muted);
      line-height:1.7;
      max-width:500px;
    }
    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
      gap:1rem;
    }
    .card {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:12px;
      padding:1.25rem 1.5rem;
      text-decoration:none;
      color:var(--text);
      display:flex;
      align-items:center;
      gap:0.75rem;
      transition:all 0.2s;
      font-family:'Space Mono',monospace;
      font-size:0.85rem;
      cursor:pointer;
    }
    .card:hover {
      border-color:var(--accent);
      transform:translateY(-2px);
      box-shadow:0 10px 40px rgba(0,0,0,0.4);
      color:var(--accent2);
    }
    .card-icon { font-size:1.1rem; opacity:0.7; }
    .search-bar {
      display:flex;
      align-items:center;
      gap:1rem;
      margin-bottom:2rem;
    }
    .search-input {
      flex:1;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:8px;
      padding:0.75rem 1rem;
      color:var(--text);
      font-family:'Space Mono',monospace;
      font-size:0.85rem;
      outline:none;
      transition:border-color 0.2s;
      max-width:400px;
    }
    .search-input:focus { border-color:var(--accent); }
    .search-input::placeholder { color:var(--muted); }
    .info-cards {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
      gap:1rem;
      margin-bottom:3rem;
    }
    .info-card {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:12px;
      padding:1.5rem 2rem;
      text-decoration:none;
      color:var(--text);
      transition:all 0.2s;
      display:flex;
      align-items:center;
      gap:1rem;
    }
    .info-card:hover {
      border-color:var(--accent);
      transform:translateY(-2px);
      box-shadow:0 10px 40px rgba(0,0,0,0.4);
    }
    .info-card-icon { font-size:2rem; }
    .info-card-label {
      font-size:1.1rem;
      font-weight:700;
    }
    .info-card-sub {
      font-family:'Space Mono',monospace;
      font-size:0.7rem;
      color:var(--muted);
    }
    footer {
      position:relative;
      z-index:1;
      border-top:1px solid var(--border);
      padding:1.5rem 2rem;
      text-align:center;
      font-family:'Space Mono',monospace;
      font-size:0.75rem;
      color:var(--muted);
    }
    footer span { color:var(--accent); }
    body.rainbow-mode { animation:rainbowBg 3s linear infinite; }
    @keyframes rainbowBg { 0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(360deg)} }
    .about-section {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:16px;
      padding:2.5rem;
      max-width:700px;
    }
    .about-text {
      font-family:'Space Mono',monospace;
      font-size:0.85rem;
      color:var(--muted);
      line-height:1.9;
    }
    .about-text a { color:var(--accent2); text-decoration:none; }
    .about-text a:hover { text-decoration:underline; }
    .discord-link {
      display:inline-flex;
      align-items:center;
      gap:0.5rem;
      margin-top:1.5rem;
      padding:0.6rem 1.25rem;
      background:var(--accent);
      color:#fff;
      text-decoration:none;
      border-radius:8px;
      font-family:'Space Mono',monospace;
      font-size:0.8rem;
      transition:all 0.2s;
    }
    .discord-link:hover { background:#6d28d9; transform:translateY(-2px); }
    /* Profile */
    .profile-layout {
      display:grid;
      grid-template-columns:280px 1fr;
      gap:2rem;
      align-items:start;
    }
    @media(max-width:700px){ .profile-layout{ grid-template-columns:1fr; } }
    .profile-sidebar {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:16px;
      padding:2rem;
      text-align:center;
    }
    .profile-avatar {
      width:100px;
      height:100px;
      border-radius:50%;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:3rem;
      margin:0 auto 1rem;
      border:3px solid var(--border);
    }
    .profile-name {
      font-size:1.5rem;
      font-weight:800;
      margin-bottom:0.5rem;
    }
    .profile-status {
      display:inline-flex;
      align-items:center;
      gap:0.4rem;
      font-family:'Space Mono',monospace;
      font-size:0.7rem;
      color:#22c55e;
    }
    .profile-status-dot {
      width:6px;height:6px;border-radius:50%;
      background:#22c55e;animation:pulse 2s infinite;
    }
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
    .profile-links {
      display:flex;
      flex-direction:column;
      gap:0.75rem;
    }
    .social-link {
      display:flex;
      align-items:center;
      gap:0.75rem;
      padding:0.85rem 1.25rem;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:10px;
      text-decoration:none;
      color:var(--text);
      font-family:'Space Mono',monospace;
      font-size:0.8rem;
      transition:all 0.2s;
    }
    .social-link:hover {
      border-color:var(--accent);
      color:var(--accent2);
      transform:translateX(4px);
    }
    .social-link .social-icon { font-size:1.1rem; }
    /* Status page */
    .status-card {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:16px;
      padding:2rem;
      max-width:500px;
      display:flex;
      align-items:center;
      gap:1.5rem;
    }
    .status-indicator {
      width:16px;height:16px;border-radius:50%;
      background:#22c55e;
      box-shadow:0 0 20px #22c55e;
      animation:pulse 2s infinite;
      flex-shrink:0;
    }
    .status-text { font-weight:700; font-size:1.1rem; margin-bottom:0.25rem; }
    .status-sub { font-family:'Space Mono',monospace; font-size:0.75rem; color:var(--muted); }
  </style>

</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">AXO<span>BOYS</span></a>
  <div style="display:flex;align-items:center;gap:2rem;">
    
    <a href="bot1.html" class="nav-back">← Commandes AciBot</a>
  </div>
</nav>
<main>
  <div class="page-header">
    <div class="page-label">// AciBot</div>
    <h1 class="page-title" style="font-family:'Space Mono',monospace;">/classement</h1>
  </div>
  <div class="about-section">
    <p class="about-text">Une commande pour voir le top 10 des joueurs avec le plus de points.</p>
    <a href="https://discord.gg/vjw3vEkfHR" target="_blank" class="discord-link">💬 Rejoindre AciBot Discord</a>
  </div>
</main>
<footer><p>© 2026 <span>Axoboys</span> — Tous droits réservés</p></footer>

  <script>
    const code=[38,38,40,40,37,39,37,39,66,65];let pos=0;
    document.addEventListener('keydown',e=>{
      if(e.keyCode===code[pos]){pos++;if(pos===code.length){document.body.classList.add('rainbow-mode');alert('🎉 Mode arc-en-ciel activé !');pos=0;}}else{pos=0;}
    });
  </script>

</body>
</html>

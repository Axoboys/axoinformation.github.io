<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Code Factory — Axoboys</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0a0a0f; --surface:#111118; --border:#1e1e2e;
      --accent:#7c3aed; --accent2:#06b6d4; --accent3:#f59e0b;
      --text:#e2e8f0; --muted:#64748b; --glow:rgba(124,58,237,0.3);
      --green:#22c55e; --red:#ef4444; --purple:#a855f7;
      --nav-h:52px; --tab-h:60px;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;overflow:hidden;}
    body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;display:flex;flex-direction:column;}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(124,58,237,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(124,58,237,0.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}

    /* ── NAV ── */
    nav{position:relative;z-index:100;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 1rem;height:var(--nav-h);background:rgba(10,10,15,0.97);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);}
    .nav-logo{font-size:1rem;font-weight:800;letter-spacing:0.1em;color:var(--text);text-decoration:none;}
    .nav-logo span{color:var(--accent);}
    .nav-right{display:flex;align-items:center;gap:0.6rem;}
    .nav-right a{font-family:'Space Mono',monospace;font-size:0.62rem;color:var(--muted);text-decoration:none;transition:color 0.2s;}
    .nav-right a:hover{color:var(--accent2);}
    .save-indicator{font-family:'Space Mono',monospace;font-size:0.6rem;color:var(--green);display:none;}
    .prestige-badge{font-family:'Space Mono',monospace;font-size:0.6rem;color:var(--accent3);display:none;}
    .nav-save-btn{padding:0.25rem 0.65rem;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);font-family:'Space Mono',monospace;font-size:0.6rem;cursor:pointer;transition:all 0.15s;}
    .nav-save-btn:hover{border-color:var(--green);color:var(--green);}
    .nav-save-btn:active{transform:scale(0.94);}

    /* ── DESKTOP LAYOUT ── */
    .game-wrapper{flex:1;overflow:hidden;position:relative;z-index:1;display:flex;}
    .panel{display:flex;flex-direction:column;overflow:hidden;}
    .panel-left{width:240px;flex-shrink:0;border-right:1px solid var(--border);}
    .panel-center{flex:1;display:flex;flex-direction:column;overflow:hidden;}
    .panel-title{padding:0.55rem 1rem;font-family:'Space Mono',monospace;font-size:0.6rem;color:var(--accent);letter-spacing:0.2em;text-transform:uppercase;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
    .panel-title-sub{color:var(--muted);font-size:0.55rem;}

    /* ── CLICK ZONE ── */
    .click-zone{padding:1.1rem 1rem;border-bottom:1px solid var(--border);text-align:center;flex-shrink:0;}
    .big-btn{width:100%;padding:0.9rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;cursor:pointer;font-family:'Space Mono',monospace;font-size:0.82rem;font-weight:700;color:var(--accent2);letter-spacing:0.08em;transition:all 0.1s;user-select:none;position:relative;overflow:hidden;}
    .big-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));transform:scaleX(0);transform-origin:left;transition:transform 0.3s;}
    .big-btn:hover::before{transform:scaleX(1);}
    .big-btn:hover{border-color:var(--accent2);box-shadow:0 0 20px rgba(6,182,212,0.12);}
    .big-btn:active{transform:scale(0.96);}
    .lines-count{font-family:'Space Mono',monospace;font-size:1.5rem;font-weight:700;color:var(--accent2);line-height:1.1;margin-top:0.55rem;}
    .lines-label{font-family:'Space Mono',monospace;font-size:0.6rem;color:var(--muted);margin-top:0.1rem;}
    .per-sec{font-family:'Space Mono',monospace;font-size:0.62rem;color:var(--accent);margin-top:0.1rem;}
    .commits-disp{font-family:'Space Mono',monospace;font-size:0.58rem;color:var(--muted);margin-top:0.1rem;}
    .action-btns-row{display:flex;gap:0.35rem;justify-content:center;margin-top:0.65rem;flex-wrap:wrap;}
    .action-btn{padding:0.32rem 0.65rem;border-radius:7px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:'Space Mono',monospace;font-size:0.58rem;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
    .action-btn:active{transform:scale(0.94);}
    .action-btn.save-ab{border-color:var(--green);color:var(--green);}
    .action-btn.lb-ab{border-color:var(--accent3);color:var(--accent3);}
    .action-btn.ach-ab{border-color:var(--purple);color:var(--purple);}
    .action-btn.pres-ab{border-color:var(--accent3);color:var(--accent3);}

    /* ── UPGRADES LIST ── */
    .upgrades-scroll{flex:1;overflow-y:auto;padding:0.35rem;}
    .upgrades-scroll::-webkit-scrollbar{width:3px;}
    .upgrades-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
    .upgrade-btn{width:100%;padding:0.55rem 0.7rem;margin-bottom:0.28rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;cursor:pointer;text-align:left;font-family:'Space Mono',monospace;color:var(--text);transition:all 0.15s;display:flex;flex-direction:column;gap:0.1rem;}
    .upgrade-btn:hover:not(:disabled){border-color:var(--accent3);background:rgba(245,158,11,0.05);}
    .upgrade-btn:disabled{opacity:0.32;cursor:not-allowed;}
    .upgrade-btn.bought{border-color:rgba(34,197,94,0.3);opacity:0.38;cursor:default;}
    .ub-name{font-weight:700;font-size:0.72rem;}
    .ub-desc{color:var(--muted);font-size:0.58rem;}
    .ub-cost{color:var(--accent3);font-size:0.6rem;font-weight:700;}
    .upgrade-btn.bought .ub-cost{color:var(--green);}

    /* ── TABS ── */
    .tabs-bar{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;background:rgba(10,10,15,0.5);}
    .tab-btn{flex:1;padding:0.55rem 0.2rem;font-family:'Space Mono',monospace;font-size:0.58rem;letter-spacing:0.04em;text-transform:uppercase;border:none;background:transparent;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;}
    .tab-btn.active{color:var(--accent2);border-bottom-color:var(--accent2);}
    .tab-btn:hover:not(.active){color:var(--text);}
    #tab-content{flex:1;overflow-y:auto;padding:1rem;}
    #tab-content::-webkit-scrollbar{width:3px;}
    #tab-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
    .section-label{font-family:'Space Mono',monospace;font-size:0.58rem;color:var(--accent);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:0.65rem;}

    /* ── WORKER CARDS ── */
    .worker-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0.75rem 0.9rem;margin-bottom:0.45rem;display:flex;align-items:center;gap:0.65rem;transition:all 0.2s;}
    .worker-card.can-buy{border-color:var(--accent);}
    .worker-card.can-buy:hover{box-shadow:0 0 18px rgba(124,58,237,0.12);}
    .wc-info{flex:1;}
    .wc-name{font-size:0.8rem;font-weight:700;}
    .wc-desc{font-family:'Space Mono',monospace;font-size:0.58rem;color:var(--muted);margin-top:0.12rem;}
    .wc-owned{font-family:'Space Mono',monospace;font-size:0.56rem;color:var(--accent2);margin-top:0.15rem;}
    .wc-buy{padding:0.35rem 0.75rem;border:1px solid var(--border);border-radius:6px;background:transparent;font-family:'Space Mono',monospace;font-size:0.6rem;cursor:pointer;color:var(--muted);white-space:nowrap;transition:all 0.15s;}
    .wc-buy:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
    .wc-buy:disabled{opacity:0.3;cursor:not-allowed;}
    .wc-buy.affordable{border-color:var(--accent);color:var(--accent);background:rgba(124,58,237,0.08);}

    /* ── PROJECT CARDS ── */
    .project-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0.9rem;margin-bottom:0.5rem;transition:border-color 0.2s;}
    .project-card.active-proj{border-color:var(--accent2);}
    .pc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.25rem;}
    .pc-name{font-size:0.82rem;font-weight:700;}
    .pc-reward{font-family:'Space Mono',monospace;font-size:0.62rem;color:var(--green);font-weight:700;}
    .pc-desc{font-family:'Space Mono',monospace;font-size:0.6rem;color:var(--muted);margin-top:0.18rem;}
    .progress-bar{height:4px;background:var(--border);border-radius:2px;margin-top:0.6rem;overflow:hidden;}
    .progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 0.4s;}
    .pc-actions{display:flex;justify-content:space-between;align-items:center;margin-top:0.55rem;}
    .pc-pct{font-family:'Space Mono',monospace;font-size:0.58rem;color:var(--muted);}
    .pc-btn{padding:0.28rem 0.75rem;border:1px solid var(--border);border-radius:6px;background:transparent;font-family:'Space Mono',monospace;font-size:0.6rem;cursor:pointer;color:var(--muted);transition:all 0.15s;}
    .pc-btn:hover:not(:disabled){border-color:var(--accent2);color:var(--accent2);}
    .pc-btn:disabled{opacity:0.32;cursor:not-allowed;}
    .pc-btn.complete{border-color:var(--green);color:var(--green);}
    .pc-btn.startable{border-color:var(--accent2);color:var(--accent2);background:rgba(6,182,212,0.08);}

    /* ── TECH ── */
    #tech-tree{display:grid;grid-template-columns:1fr 1fr;gap:0.55rem;}
    .tech-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0.8rem;transition:border-color 0.2s;}
    .tech-card.researched{border-color:rgba(34,197,94,0.35);}
    .tech-name{font-size:0.76rem;font-weight:700;}
    .tech-eff{font-family:'Space Mono',monospace;font-size:0.56rem;color:var(--muted);margin-top:0.18rem;}
    .tech-cost{font-family:'Space Mono',monospace;font-size:0.58rem;color:var(--accent3);margin-top:0.28rem;font-weight:700;}
    .tech-btn{margin-top:0.45rem;width:100%;padding:0.28rem;border:1px solid var(--border);border-radius:6px;background:transparent;font-family:'Space Mono',monospace;font-size:0.58rem;cursor:pointer;color:var(--muted);transition:all 0.15s;}
    .tech-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
    .tech-btn:disabled{opacity:0.32;cursor:not-allowed;}

    /* ── PRESTIGE ── */
    .prestige-info-box{background:var(--surface);border:1px solid rgba(245,158,11,0.3);border-radius:12px;padding:1.2rem;text-align:center;margin-bottom:1rem;}
    .prestige-big{font-size:2rem;font-weight:800;color:var(--accent3);}
    .prestige-sub{font-family:'Space Mono',monospace;font-size:0.62rem;color:var(--muted);margin-top:0.25rem;}
    .prestige-bonus-text{font-family:'Space Mono',monospace;font-size:0.62rem;color:var(--accent3);margin-top:0.4rem;}
    #prestige-btn{width:100%;padding:0.8rem;border:1px solid var(--accent3);border-radius:8px;background:rgba(245,158,11,0.07);color:var(--accent3);font-family:'Space Mono',monospace;font-size:0.8rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
    #prestige-btn:hover:not(:disabled){background:rgba(245,158,11,0.15);box-shadow:0 0 18px rgba(245,158,11,0.18);}
    #prestige-btn:disabled{opacity:0.32;cursor:not-allowed;}
    .milestone-item{display:flex;gap:0.55rem;padding:0.4rem 0;border-bottom:1px solid rgba(30,30,46,0.5);align-items:center;font-family:'Space Mono',monospace;font-size:0.65rem;color:var(--muted);}
    .milestone-dot{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0;transition:background 0.3s;}
    .milestone-dot.done{background:var(--green);box-shadow:0 0 6px var(--green);}

    /* ── LOG ── */
    .log-entry{display:flex;gap:0.55rem;padding:0.28rem 0;border-bottom:1px solid rgba(30,30,46,0.4);font-family:'Space Mono',monospace;font-size:0.63rem;}
    .log-time{color:var(--border);min-width:48px;}
    .log-text{color:var(--muted);}

    /* ── LEADERBOARD ── */
    .lb-row{display:grid;grid-template-columns:28px 1fr 90px;align-items:center;gap:0.45rem;padding:0.55rem 0.4rem;border-radius:8px;margin-bottom:0.25rem;}
    .lb-row:hover{background:rgba(255,255,255,0.02);}
    .lb-row.lb-me{background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.22);}
    .lb-row.lb-header{color:var(--muted);font-family:'Space Mono',monospace;font-size:0.54rem;letter-spacing:0.1em;text-transform:uppercase;padding-bottom:0.35rem;border-bottom:1px solid var(--border);margin-bottom:0.15rem;}
    .lb-rank{font-family:'Space Mono',monospace;font-size:0.78rem;font-weight:700;text-align:center;}
    .lb-rank-1{color:#eab308;}.lb-rank-2{color:#94a3b8;}.lb-rank-3{color:#b45309;}
    .lb-user{display:flex;align-items:center;gap:0.4rem;min-width:0;}
    .lb-avatar{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:0.6rem;font-weight:700;flex-shrink:0;}
    .lb-username{font-weight:700;font-size:0.75rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .lb-val{font-family:'Space Mono',monospace;font-size:0.7rem;color:var(--accent2);text-align:right;}
    .lb-empty{text-align:center;padding:2rem 1rem;font-family:'Space Mono',monospace;font-size:0.75rem;color:var(--muted);}
    .lb-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:0.75rem;}
    .lb-tab{padding:0.4rem 0.9rem;font-family:'Space Mono',monospace;font-size:0.6rem;cursor:pointer;color:var(--muted);border:none;background:transparent;transition:all 0.2s;border-bottom:2px solid transparent;}
    .lb-tab.active{color:var(--accent3);border-bottom-color:var(--accent3);}

    /* ── ACHIEVEMENTS ── */
    .ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.55rem;}
    .ach-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0.75rem;position:relative;overflow:hidden;transition:all 0.2s;}
    .ach-card.unlocked{border-color:rgba(245,158,11,0.4);background:rgba(245,158,11,0.04);}
    .ach-card.unlocked::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent3),var(--accent2));}
    .ach-icon{font-size:1.4rem;margin-bottom:0.35rem;}
    .ach-name{font-size:0.72rem;font-weight:700;}
    .ach-desc{font-family:'Space Mono',monospace;font-size:0.56rem;color:var(--muted);margin-top:0.12rem;line-height:1.5;}
    .ach-locked{filter:grayscale(1);opacity:0.35;}
    .ach-locked .ach-icon{filter:blur(1px);}
    .ach-progress-bar{height:3px;background:var(--border);border-radius:2px;margin-top:0.4rem;overflow:hidden;}
    .ach-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent3),var(--accent2));transition:width 0.4s;}
    .ach-count{font-family:'Space Mono',monospace;font-size:0.58rem;color:var(--accent3);margin-bottom:0.65rem;}

    /* ── BADGES ── */
    .badge{display:inline-block;padding:0.08rem 0.38rem;border-radius:4px;font-family:'Space Mono',monospace;font-size:0.55rem;font-weight:700;margin-left:0.3rem;}
    .badge-green{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);color:var(--green);}
    .badge-amber{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);color:var(--accent3);}
    .badge-blue{background:rgba(6,182,212,0.1);border:1px solid rgba(6,182,212,0.3);color:var(--accent2);}

    /* ── MODALS ── */
    .modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.82);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s;}
    @media(min-width:768px){.modal-overlay{align-items:center;}}
    .modal-overlay.open{opacity:1;pointer-events:all;}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;transform:translateY(60px);transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);}
    @media(min-width:768px){.modal{border-radius:20px;width:min(600px,96vw);max-height:82vh;}}
    .modal-overlay.open .modal{transform:translateY(0);}
    .modal-handle{width:40px;height:4px;border-radius:2px;background:var(--border);margin:0.65rem auto 0;flex-shrink:0;}
    @media(min-width:768px){.modal-handle{display:none;}}
    .modal-header{display:flex;align-items:center;justify-content:space-between;padding:0.9rem 1.4rem 0.7rem;border-bottom:1px solid var(--border);flex-shrink:0;}
    .modal-title{font-size:1.1rem;font-weight:800;}
    .modal-close{width:30px;height:30px;border-radius:50%;background:transparent;border:1px solid var(--border);color:var(--muted);font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
    .modal-close:hover{border-color:var(--red);color:var(--red);}
    .modal-body{overflow-y:auto;flex:1;padding:0.75rem 1.2rem 1rem;}
    .modal-body::-webkit-scrollbar{width:3px;}
    .modal-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

    /* ── TOAST ── */
    .toast{position:fixed;bottom:calc(var(--tab-h) + 0.75rem);left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0.55rem 1.1rem;font-family:'Space Mono',monospace;font-size:0.7rem;z-index:998;transition:transform 0.3s,opacity 0.3s;opacity:0;white-space:nowrap;max-width:92vw;}
    @media(min-width:768px){.toast{bottom:1.5rem;}}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

    /* ── FLOAT NUMBERS ── */
    #floats-container{position:fixed;pointer-events:none;z-index:300;top:0;left:0;width:100%;height:100%;}
    .float-num{position:absolute;font-family:'Space Mono',monospace;font-size:0.8rem;font-weight:700;color:var(--accent2);animation:floatUp 1s ease-out forwards;pointer-events:none;}
    @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-45px) scale(0.65);}}

    /* ── MOBILE TABS ── */
    .mobile-tabs{position:relative;z-index:100;display:flex;flex-shrink:0;height:var(--tab-h);background:rgba(10,10,15,0.97);border-top:1px solid var(--border);}
    .mob-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.12rem;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:color 0.2s;font-family:'Space Mono',monospace;font-size:0.5rem;letter-spacing:0.02em;padding-bottom:env(safe-area-inset-bottom,0);}
    .mob-tab .tab-icon{font-size:1.1rem;line-height:1;}
    .mob-tab.active{color:var(--accent2);}
    .mob-tab.active .tab-icon{filter:drop-shadow(0 0 5px var(--accent2));}

    /* ── MOBILE PANELS ── */
    @media(min-width:768px){
      .mobile-tabs{display:none!important;}
      .panel-left{display:flex!important;position:static!important;}
      .panel-center{display:flex!important;position:static!important;}
    }
    @media(max-width:767px){
      .game-wrapper{flex-direction:column;}
      .panel-left,.panel-center{display:none;position:fixed;inset:var(--nav-h) 0 var(--tab-h) 0;z-index:50;background:var(--bg);flex-direction:column;}
      .panel-left.mob-show,.panel-center.mob-show{display:flex;}
      .panel-left{width:100%;border-right:none;}
    }

    /* RESET BUTTON */
    .reset-btn{padding:0.28rem 0.55rem;border:1px solid rgba(239,68,68,0.3);border-radius:6px;background:transparent;color:rgba(239,68,68,0.6);font-family:'Space Mono',monospace;font-size:0.56rem;cursor:pointer;transition:all 0.2s;}
    .reset-btn:hover{border-color:var(--red);color:var(--red);}
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">AXO<span>BOYS</span></a>
  <div class="nav-right">
    <span class="save-indicator" id="save-indicator">✓ Sauvé</span>
    <span class="prestige-badge" id="prestige-badge"></span>
    <button class="nav-save-btn" onclick="saveGame(true)">💾 Sauver</button>
    <a href="clicker.html" style="display:none;" class="desktop-only" id="nav-clicker">🍪 Clicker</a>
    <a href="index.html">Hub</a>

<script>
// ============================================================
// GAME STATE
// ============================================================
const G = {
  lines:0, totalLines:0, commits:0,
  prestige:0, prestigeBonus:1,
  lastTick:Date.now(),
  upgrades:{}, workers:{}, techs:{},
  activeProjects:{}, completedProjects:{},
  logEntries:[], currentTab:'workers',
  totalClicks:0,
};
let milestonesSeen = new Set();
let unlockedAch = new Set();
const SAVE_KEY = 'axo_factory_save';
const LB_KEY   = 'axo_factory_lb';
let currentLbTab = 'lines';

// ============================================================
// SAVE / LOAD
// ============================================================
function saveGame(manual=false) {
  const data = {
    lines:G.lines, totalLines:G.totalLines, commits:G.commits,
    prestige:G.prestige, prestigeBonus:G.prestigeBonus,
    upgrades:G.upgrades, workers:G.workers, techs:G.techs,
    activeProjects:G.activeProjects, completedProjects:G.completedProjects,
    logEntries:G.logEntries.slice(-60), totalClicks:G.totalClicks,
    milestonesSeen:[...milestonesSeen], unlockedAch:[...unlockedAch],
  };
  localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  // Update leaderboard entry
  updateLbEntry();
  if (manual) {
    const si = document.getElementById('save-indicator');
    si.style.display = 'inline';
    setTimeout(() => si.style.display='none', 1600);
    showToast('💾 Sauvegarde effectuée !');
  }
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    const d = JSON.parse(raw);
    Object.assign(G, {
      lines:d.lines||0, totalLines:d.totalLines||0, commits:d.commits||0,
      prestige:d.prestige||0, prestigeBonus:d.prestigeBonus||1,
      upgrades:d.upgrades||{}, workers:d.workers||{}, techs:d.techs||{},
      activeProjects:d.activeProjects||{}, completedProjects:d.completedProjects||{},
      logEntries:d.logEntries||[], totalClicks:d.totalClicks||0,
    });
    milestonesSeen = new Set(d.milestonesSeen||[]);
    unlockedAch    = new Set(d.unlockedAch||[]);
    if (G.prestige > 0) {
      const pb = document.getElementById('prestige-badge');
      pb.style.display='inline'; pb.textContent=`⭐ P${G.prestige}`;
    }
  } catch(e) { console.error('Load error',e); }
}

function confirmReset() {
  if (!confirm('⚠️ Réinitialiser la partie ?\n\nToute ta progression sera perdue. Irréversible !')) return;
  localStorage.removeItem(SAVE_KEY);
  location.reload();
}

// ============================================================
// LEADERBOARD (localStorage global simulation)
// ============================================================
function updateLbEntry() {
  const name = localStorage.getItem('axo_factory_player') || generatePlayerName();
  const entries = getLbEntries();
  const idx = entries.findIndex(e => e.name === name);
  const entry = { name, totalLines:G.totalLines, prestige:G.prestige, commits:Math.floor(G.commits), ts:Date.now() };
  if (idx >= 0) entries[idx] = entry; else entries.push(entry);
  localStorage.setItem(LB_KEY, JSON.stringify(entries));
}
function getLbEntries() {
  try { return JSON.parse(localStorage.getItem(LB_KEY)||'[]'); } catch(e){ return []; }
}
function generatePlayerName() {
  const adj = ['Swift','Silent','Cosmic','Quantum','Cyber','Hyper','Dark','Neon'];
  const noun= ['Dev','Coder','Hacker','Wizard','Builder','Ninja','Ghost'];
  const name = adj[Math.floor(Math.random()*adj.length)]+noun[Math.floor(Math.random()*noun.length)]+(Math.floor(Math.random()*9000)+1000);
  localStorage.setItem('axo_factory_player', name);
  return name;
}
function getMyName() { return localStorage.getItem('axo_factory_player') || generatePlayerName(); }

function renderLeaderboard() {
  const entries = getLbEntries();
  const myName  = getMyName();
  let sorted;
  if (currentLbTab === 'lines')   sorted = [...entries].sort((a,b)=>(b.totalLines||0)-(a.totalLines||0));
  if (currentLbTab === 'prestige')sorted = [...entries].sort((a,b)=>(b.prestige||0)-(a.prestige||0));
  if (currentLbTab === 'commits') sorted = [...entries].sort((a,b)=>(b.commits||0)-(a.commits||0));
  const c = document.getElementById('lb-content');
  if (!sorted.length){ c.innerHTML='<div class="lb-empty">Aucun joueur — joue pour apparaître !</div>'; return; }
  let html = `<div class="lb-row lb-header"><span>#</span><span>Joueur</span><span>Score</span></div>`;
  sorted.slice(0,20).forEach((e,i) => {
    const rank = i+1;
    const rankClass = rank===1?'lb-rank-1':rank===2?'lb-rank-2':rank===3?'lb-rank-3':'';
    const isMe = e.name === myName;
    const val = currentLbTab==='lines' ? fmt(e.totalLines||0)+'L' : currentLbTab==='prestige' ? (e.prestige||0)+'⭐' : fmt(e.commits||0);
    html += `<div class="lb-row ${isMe?'lb-me':''}">
      <div class="lb-rank ${rankClass}">${rank<=3?['🥇','🥈','🥉'][rank-1]:rank}</div>
      <div class="lb-user"><div class="lb-avatar">${e.name.charAt(0)}</div><div class="lb-username">${e.name}${isMe?' <span style="font-size:0.5rem;color:var(--accent);">[toi]</span>':''}</div></div>
      <div class="lb-val">${val}</div>
    </div>`;
  });
  c.innerHTML = html;
}

window.switchLbTab = function(tab, btn) {
  currentLbTab = tab;
  document.querySelectorAll('.lb-tab').forEach(b=>b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderLeaderboard();
};

      newUnlock = true;
      addLog(`🎖 Succès débloqué : ${a.name}`);
      showToast(`🎖 ${a.name} débloqué !`);
    }
  });
  if (newUnlock) saveGame();
}

// ============================================================
function fmt(n) {
  if (n >= 1e15) return (n/1e15).toFixed(2)+'Q';
  if (n >= 1e12) return (n/1e12).toFixed(2)+'T';
  if (n >= 1e9)  return (n/1e9).toFixed(2)+'B';
  if (n >= 1e6)  return (n/1e6).toFixed(2)+'M';
  if (n >= 1e3)  return (n/1e3).toFixed(1)+'K';
  return Math.floor(n).toString();
}
function addLines(n){ G.lines+=n; G.totalLines+=n; }
function addLog(msg){
  const t=new Date(), time=t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0');
  G.logEntries.unshift({time,msg});
  if(G.logEntries.length>80) G.logEntries.pop();
}
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'), 2400);
}
function spawnFloat(x,y,val){
  const el=document.createElement('div');
  el.className='float-num'; el.textContent='+'+fmt(val);
  el.style.left=(x-20)+'px'; el.style.top=(y-20)+'px';
  document.getElementById('floats-container').appendChild(el);
  setTimeout(()=>el.remove(), 1100);
}

// ============================================================
// COMPUTE
// ============================================================
function computeLps(){
  let lps=0;
  WORKERS.forEach(w=>{
    const owned=G.workers[w.id]||0; if(!owned)return;
    let wlps=w.baseLps*owned;
    UPGRADES.forEach(u=>{ if(G.upgrades[u.id]&&u.effect==='worker'&&u.wid===w.id) wlps*=u.mult; });
    lps+=wlps;
  });
  UPGRADES.forEach(u=>{ if(G.upgrades[u.id]&&u.effect==='global') lps*=u.mult; });
  TECHS.forEach(t=>{ if(G.techs[t.id]&&t.mult) lps*=t.mult; });
  lps*=G.prestigeBonus;
  return lps;
}
function computeClickPower(){
  let cp=1;
  UPGRADES.forEach(u=>{ if(G.upgrades[u.id]&&u.effect==='click') cp*=u.mult; });
  TECHS.forEach(t=>{ if(G.techs[t.id]&&t.clickMult) cp*=t.clickMult; });
  return cp*G.prestigeBonus;
}
function workerCost(w){ return Math.ceil(w.baseCost*Math.pow(1.15, G.workers[w.id]||0)); }

// ============================================================
// INTERACTIONS
// ============================================================
document.getElementById('big-btn').addEventListener('click', function(e){
  const cp = computeClickPower();
  addLines(cp); G.commits+=cp*0.005; G.totalClicks++;
  checkMilestones(); checkAchievements();
  updateUI();
  const r=this.getBoundingClientRect();
  spawnFloat(r.left+r.width/2, r.top, cp);
});

window.buyWorker = function(id){
  const w=WORKERS.find(x=>x.id===id); if(!w)return;
  const cost=workerCost(w);
  if(G.lines<cost){showToast('❌ Pas assez de lignes !');return;}
  G.lines-=cost; G.workers[id]=(G.workers[id]||0)+1;
  addLog(`${w.emoji} ${w.name} engagé (×${G.workers[id]})`);
  checkAchievements(); updateUI(); saveGame();
};

window.buyUpgrade = function(id){
  const u=UPGRADES.find(x=>x.id===id); if(!u||G.upgrades[id])return;
  if(G.lines<u.cost){showToast('❌ Pas assez de lignes !');return;}
  G.lines-=u.cost; G.upgrades[id]=true;
  addLog(`✨ ${u.name} débloquée`);
  updateUI(); saveGame();
};

window.buyTech = function(id){
  const t=TECHS.find(x=>x.id===id); if(!t||G.techs[id])return;
  if(G.lines<t.cost){showToast('❌ Pas assez de lignes !');return;}
  G.lines-=t.cost; G.techs[id]=true;
  addLog(`🔬 ${t.name} recherchée`);
  checkAchievements(); updateUI(); saveGame();
};

window.startProject = function(id){
  const p=PROJECTS.find(x=>x.id===id); if(!p)return;
  if(G.activeProjects[id]){showToast('⏳ Projet déjà en cours !');return;}
  if(G.lines<p.lines){showToast('❌ Pas assez de lignes !');return;}
  G.lines-=p.lines;
  G.activeProjects[id]={progress:0, duration:p.duration, startTs:Date.now()};
  addLog(`📋 Projet "${p.name}" démarré`);
  updateUI();
};

window.collectProject = function(id){
  const p=PROJECTS.find(x=>x.id===id); if(!p||!G.activeProjects[id])return;
  if(G.activeProjects[id].progress<1){showToast('⏳ Projet pas encore terminé !');return;}
  addLines(p.reward); G.commits+=p.reward*0.02;
  if(!G.completedProjects) G.completedProjects={};
  G.completedProjects[id]=(G.completedProjects[id]||0)+1;
  delete G.activeProjects[id];
  showToast(`✅ "${p.name}" livré ! +${fmt(p.reward)} L`);
  addLog(`✅ Projet "${p.name}" livré — +${fmt(p.reward)} lignes`);
  checkAchievements(); updateUI(); saveGame();
};

window.doPrestige = function(){
  if(G.totalLines<1000000)return;
  const gain=Math.max(1,Math.floor(Math.sqrt(G.totalLines/1000000)));
  if(!confirm(`⭐ Faire Prestige ?\n\nTu gagnes ${gain} étoile(s) et recommences depuis zéro.\nChaque étoile booste la prod de +5%.`))return;
  G.prestige+=gain; G.prestigeBonus=1+G.prestige*0.05;
  G.lines=0; G.totalLines=0; G.commits=0;
  G.upgrades={}; G.workers={}; G.techs={}; G.activeProjects={};
  milestonesSeen=new Set();
  addLog(`⭐ Prestige ! +${gain} étoile(s) — Total: ${G.prestige} ★`);
  const pb=document.getElementById('prestige-badge');
  pb.style.display='inline'; pb.textContent=`⭐ P${G.prestige}`;
  showToast(`⭐ Prestige ! ${G.prestige} étoile(s) au total.`);
  checkAchievements(); updateUI(); saveGame();
};

// ============================================================
// MILESTONES
// ============================================================
function checkMilestones(){
  MILESTONES.forEach(m=>{
    if(!milestonesSeen.has(m.lines)&&G.totalLines>=m.lines){
      milestonesSeen.add(m.lines);
      addLog('🎯 '+m.label); showToast('🎯 '+m.label);
    }
  });
}

// ============================================================
// MODAL SYSTEM
// ============================================================
window.openModal = function(id){
  document.getElementById('modal-'+id).classList.add('open');
  if(id==='lb') renderLeaderboard();
  if(id==='ach') renderAchievements();
};
window.closeModal = function(id){ document.getElementById('modal-'+id).classList.remove('open'); };
window.closeModalOut = function(e,id){ if(e.target===document.getElementById('modal-'+id)) closeModal(id); };

// ============================================================
// TABS
// ============================================================
window.showTab = function(id){
  G.currentTab=id;
  document.querySelectorAll('#desktop-tabs .tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',['workers','projects','tech','prestige','log'][i]===id);
  });
  renderTab();
};

window.switchMobTab = function(tab){
  // Hide all
  document.getElementById('panel-left').classList.remove('mob-show');
  document.getElementById('panel-center').classList.remove('mob-show');
  document.querySelectorAll('.mob-tab').forEach(b=>b.classList.remove('active'));

  if(tab==='left'){
    document.getElementById('panel-left').classList.add('mob-show');
    document.getElementById('mtab-left').classList.add('active');
  } else if(tab==='more'){
    openModal('more');
    document.getElementById('mtab-more').classList.add('active');
  } else {
    document.getElementById('panel-center').classList.add('mob-show');
    showTab(tab);
    const mobMap={workers:'mtab-workers',projects:'mtab-projects',tech:'mtab-tech',prestige:'mtab-more',log:'mtab-more'};
    const mobEl=document.getElementById(mobMap[tab]);
    if(mobEl) mobEl.classList.add('active');
  }
};

function renderTab(){
  const c=document.getElementById('tab-content');
  switch(G.currentTab){
    case 'workers':  renderWorkers(c);  break;
    case 'projects': renderProjects(c); break;
    case 'tech':     renderTech(c);     break;
    case 'prestige': renderPrestige(c); break;
    case 'log':      renderLog(c);      break;
  }
}

// ============================================================
// RENDER FUNCTIONS
// ============================================================
function renderWorkers(c){
  let html='<div class="section-label">// équipe de développement</div>';
  WORKERS.forEach(w=>{
    const cost=workerCost(w), owned=G.workers[w.id]||0, canBuy=G.lines>=cost;
    let wlps=owned ? (w.baseLps*owned) : 0;
    UPGRADES.forEach(u=>{if(G.upgrades[u.id]&&u.effect==='worker'&&u.wid===w.id)wlps*=u.mult;});
    html+=`<div class="worker-card ${canBuy?'can-buy':''}">
      <div style="font-size:1.3rem;flex-shrink:0;">${w.emoji}</div>
      <div class="wc-info">
        <div class="wc-name">${w.name}${owned?` <span class="badge badge-blue">${owned}</span>`:''}</div>
        <div class="wc-desc">${w.desc}</div>
        ${owned?`<div class="wc-owned">${fmt(wlps)} L/sec</div>`:''}
      </div>
      <button class="wc-buy ${canBuy?'affordable':''}" onclick="buyWorker('${w.id}')" ${G.lines<cost?'disabled':''}>
        ${fmt(cost)} L
      </button>
    </div>`;
  });
  c.innerHTML=html;
}

function renderProjects(c){
  let html='<div class="section-label">// projets clients</div>';
  PROJECTS.forEach(p=>{
    const ap=G.activeProjects[p.id];
    const done=ap&&ap.progress>=1;
    const pct=ap?Math.min(1,ap.progress):0;
    const canStart=!ap&&G.lines>=p.lines;
    const completed=G.completedProjects&&G.completedProjects[p.id]?G.completedProjects[p.id]:0;
    html+=`<div class="project-card ${ap?'active-proj':''}">
      <div class="pc-header">
        <div class="pc-name">${p.name}${completed?` <span class="badge badge-green">×${completed}</span>`:''}</div>
        <div class="pc-reward">+${fmt(p.reward)} L</div>
      </div>
      <div class="pc-desc">${p.desc} — Coût: ${fmt(p.lines)} L | Durée: ${p.duration}s</div>
      ${ap?`<div class="progress-bar"><div class="progress-fill" style="width:${Math.floor(pct*100)}%"></div></div>`:''}
      <div class="pc-actions">
        <span class="pc-pct">${ap?(done?'✅ Prêt à livrer !':Math.floor(pct*100)+'%'):(canStart?`Disponible`:`Coût: ${fmt(p.lines)} L`)}</span>
        ${done
          ?`<button class="pc-btn complete" onclick="collectProject('${p.id}')">Livrer →</button>`
          :ap
          ?`<button class="pc-btn" disabled>En cours...</button>`
          :`<button class="pc-btn ${canStart?'startable':''}" onclick="startProject('${p.id}')" ${canStart?'':'disabled'}>Démarrer</button>`}
      </div>
    </div>`;
  });
  c.innerHTML=html;
}

function renderTech(c){
  let html='<div class="section-label">// arbre technologique</div><div id="tech-tree">';
  TECHS.forEach(t=>{
    if(G.totalLines<t.unlock&&!G.techs[t.id])return;
    const done=G.techs[t.id], canAfford=!done&&G.lines>=t.cost;
    html+=`<div class="tech-card ${done?'researched':''}">
      <div class="tech-name">${t.name}${done?' <span class="badge badge-green">✓</span>':''}</div>
      <div class="tech-eff">${t.desc}</div>
      <div class="tech-cost">${done?t.effect:t.effect+' — '+fmt(t.cost)+' L'}</div>
      ${!done?`<button class="tech-btn" onclick="buyTech('${t.id}')" ${canAfford?'':'disabled'}>Rechercher</button>`:''}
    </div>`;
  });
  html+='</div>';
  c.innerHTML=html;
}

function renderPrestige(c){
  const canPrestige=G.totalLines>=1000000;
  const gain=canPrestige?Math.max(1,Math.floor(Math.sqrt(G.totalLines/1000000))):0;
  let html=`<div class="prestige-info-box">
    <div class="prestige-big">${G.prestige} ★</div>
    <div class="prestige-sub">Étoiles de Prestige</div>
    <div class="prestige-bonus-text">Bonus actuel: +${Math.round((G.prestigeBonus-1)*100)}% prod</div>
  </div>
  <p style="font-family:'Space Mono',monospace;font-size:0.65rem;color:var(--muted);margin-bottom:0.9rem;line-height:1.7;">
    Le Prestige remet le jeu à zéro mais te donne des étoiles permanentes (chacune +5% prod).
  </p>
  <p style="font-family:'Space Mono',monospace;font-size:0.65rem;color:${canPrestige?'var(--green)':'var(--muted)'};margin-bottom:0.9rem;">
    ${canPrestige?`→ Tu gagnerais ${gain} étoile(s) maintenant !`:'→ Atteins 1 000 000 lignes pour débloquer'}
  </p>
  <button id="prestige-btn" onclick="doPrestige()" ${canPrestige?'':'disabled'}>⭐ Faire Prestige (≥ 1M L)</button>
  <div style="margin-top:1.25rem;" class="section-label">// milestones</div>`;
  MILESTONES.forEach(m=>{
    const done=milestonesSeen.has(m.lines);
    html+=`<div class="milestone-item"><div class="milestone-dot ${done?'done':''}"></div><span>${m.label}</span></div>`;
  });
  c.innerHTML=html;
}

function renderLog(c){
  let html='<div class="section-label">// journal de bord</div>';
  if(!G.logEntries.length) html+='<div style="font-family:\'Space Mono\',monospace;font-size:0.68rem;color:var(--muted);padding:0.5rem 0;">Aucune entrée...</div>';
  G.logEntries.forEach(e=>{
    html+=`<div class="log-entry"><span class="log-time">${e.time}</span><span class="log-text">${e.msg}</span></div>`;
  });
  c.innerHTML=html;
}

function renderUpgrades(){
  const c=document.getElementById('upgrades-container');
  let visible=0, total=UPGRADES.length, html='';
  UPGRADES.forEach(u=>{
    if(G.totalLines<u.unlock&&!G.upgrades[u.id])return;
    visible++;
    const done=G.upgrades[u.id], canAfford=!done&&G.lines>=u.cost;
    html+=`<button class="upgrade-btn ${done?'bought':''}" onclick="buyUpgrade('${u.id}')" ${done?'disabled':''}>
      <span class="ub-name">${u.name}</span>
      <span class="ub-desc">${u.desc}</span>
      ${done?'<span class="ub-cost">✓ Acheté</span>':`<span class="ub-cost" style="${canAfford?'color:var(--accent3);':''}">${fmt(u.cost)} L</span>`}
    </button>`;
  });
  c.innerHTML=html||'<div style="font-family:\'Space Mono\',monospace;font-size:0.6rem;color:var(--muted);padding:0.4rem;">Code pour débloquer...</div>';
  const el=document.getElementById('upg-count');
  if(el) el.textContent=`${Object.keys(G.upgrades).length}/${visible}`;
}

// ============================================================
// UPDATE UI
// ============================================================
function updateUI(){
  document.getElementById('h-lines').textContent=fmt(G.lines);
  document.getElementById('per-sec').textContent=fmt(computeLps())+' L/sec';
  document.getElementById('h-commits').textContent=fmt(G.commits)+' commits';
  renderUpgrades();
  renderTab();
}

// ============================================================
// GAME LOOP
// ============================================================
function gameTick(){
  const now=Date.now(), dt=(now-G.lastTick)/1000;
  G.lastTick=now;
  const lps=computeLps();
  if(lps>0){ addLines(lps*dt); G.commits+=lps*dt*0.01; checkMilestones(); }
  Object.keys(G.activeProjects).forEach(id=>{
    const ap=G.activeProjects[id];
    if(ap.progress<1) ap.progress+=dt/ap.duration;
  });
  document.getElementById('h-lines').textContent=fmt(G.lines);
  if(G.currentTab==='projects'||G.currentTab==='prestige') renderTab();
}

// ============================================================
// INIT
// ============================================================
loadGame();
addLog('Bienvenue dans Code Factory !');
addLog('Clique sur [CODER] pour commencer...');
updateUI();
showTab('workers');
// Mobile: start on coder panel
if(window.innerWidth<768){
  switchMobTab('left');
}
setInterval(gameTick, 100);
setInterval(updateUI, 2500);
setInterval(()=>saveGame(), 30000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>AxoClicker 🍪</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0a0a0f; --surface:#111118; --border:#1e1e2e;
      --accent:#7c3aed; --accent2:#06b6d4; --accent3:#f59e0b;
      --text:#e2e8f0; --muted:#64748b; --glow:rgba(124,58,237,0.3);
      --green:#22c55e; --red:#ef4444;
      --nav-h:52px; --tab-h:64px;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body { height:100%; overflow:hidden; }
    body {
      background:var(--bg); color:var(--text);
      font-family:'Syne',sans-serif;
      display:flex; flex-direction:column;
    }
    body::before {
      content:''; position:fixed; inset:0;
      background-image:linear-gradient(rgba(124,58,237,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(124,58,237,0.04) 1px,transparent 1px);
      background-size:40px 40px; pointer-events:none; z-index:0;
    }

    /* ======== NAV ======== */
    nav {
      position:relative; z-index:100; flex-shrink:0;
      display:flex; align-items:center; justify-content:space-between;
      padding:0 1rem; height:var(--nav-h);
      background:rgba(10,10,15,0.97); border-bottom:1px solid var(--border);
    }
    .nav-logo { font-size:1rem; font-weight:800; letter-spacing:0.1em; color:var(--text); text-decoration:none; }
    .nav-logo span { color:var(--accent); }
    .nav-right { display:flex; align-items:center; gap:1rem; }
    .nav-right a { font-family:'Space Mono',monospace; font-size:0.7rem; color:var(--muted); text-decoration:none; transition:color 0.2s; }
    .nav-right a:hover { color:var(--accent2); }
    .save-indicator { font-family:'Space Mono',monospace; font-size:0.65rem; color:var(--green); display:none; }

    /* ======== LAYOUT ======== */
    .game-wrapper {
      flex:1; overflow:hidden; position:relative; z-index:1;
      display:flex; flex-direction:column;
    }
    /* Desktop: 3 column */
    @media(min-width:768px) {
      .game-wrapper { flex-direction:row; }
      .mobile-tabs  { display:none !important; }
      .panel-left   { width:260px; flex-shrink:0; border-right:1px solid var(--border); display:flex !important; position:static !important; }
      .panel-right  { width:280px; flex-shrink:0; border-left:1px solid var(--border);  display:flex !important; position:static !important; }
      .panel-center { flex:1; }
    }

    /* ======== PANELS ======== */
    .panel { display:flex; flex-direction:column; overflow:hidden; }

    /* Mobile side panels are overlays */
    @media(max-width:767px) {
      .panel-left, .panel-right {
        display:none;
        position:fixed;
        inset:var(--nav-h) 0 var(--tab-h) 0;
        z-index:50; background:var(--bg);
      }
      .panel-left.mob-show,
      .panel-right.mob-show { display:flex; }
      .panel-center { flex:1; }
    }

    .panel-title {
      padding:0.75rem 1rem;
      font-family:'Space Mono',monospace; font-size:0.65rem;
      color:var(--accent); letter-spacing:0.2em; text-transform:uppercase;
      border-bottom:1px solid var(--border); flex-shrink:0;
    }

    /* ======== SCROLL LISTS ======== */
    .upgrade-list, .building-list {
      flex:1; overflow-y:auto; padding:0.5rem;
      -webkit-overflow-scrolling:touch;
    }
    .upgrade-list::-webkit-scrollbar,
    .building-list::-webkit-scrollbar { width:3px; }
    .upgrade-list::-webkit-scrollbar-thumb,
    .building-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

    /* ======== UPGRADE ITEMS ======== */
    .upgrade-item {
      display:flex; align-items:center; gap:0.75rem;
      padding:0.7rem 0.75rem; border-radius:10px;
      border:1px solid var(--border); background:var(--surface);
      margin-bottom:0.4rem; cursor:pointer; transition:all 0.15s;
      min-height:54px;
    }
    .upgrade-item.can-buy { border-color:var(--accent3); }
    .upgrade-item.can-buy:active { background:rgba(245,158,11,0.12); transform:scale(0.98); }
    .upgrade-item.bought { opacity:0.35; cursor:default; }
    .upgrade-emoji { font-size:1.3rem; flex-shrink:0; }
    .upgrade-info { flex:1; min-width:0; }
    .upgrade-name { font-size:0.82rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .upgrade-cost { font-family:'Space Mono',monospace; font-size:0.67rem; color:var(--accent3); margin-top:0.1rem; }
    .upgrade-desc { font-family:'Space Mono',monospace; font-size:0.6rem; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    /* ======== CENTER ======== */
    .panel-center {
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; padding:1rem 1rem 0.5rem; overflow:hidden;
    }
    .cookie-counter-box { text-align:center; margin-bottom:1rem; flex-shrink:0; }
    .cookie-count-main {
      font-size:clamp(1.6rem,7vw,3rem); font-weight:800;
      font-family:'Space Mono',monospace; color:var(--accent3); line-height:1;
    }
    .cookie-count-sub { font-family:'Space Mono',monospace; font-size:0.68rem; color:var(--muted); margin-top:0.25rem; }
    .cps-display { font-family:'Space Mono',monospace; font-size:0.72rem; color:var(--accent2); margin-top:0.15rem; }

    /* THE COOKIE */
    .cookie-wrap { position:relative; margin-bottom:1rem; flex-shrink:0; }
    .cookie-btn {
      width:clamp(130px,38vw,180px); height:clamp(130px,38vw,180px);
      border-radius:50%; border:none; cursor:pointer;
      background:radial-gradient(circle at 35% 35%, #d97706, #92400e);
      box-shadow:0 0 40px rgba(217,119,6,0.4), 0 8px 30px rgba(0,0,0,0.5);
      font-size:clamp(3rem,10vw,5rem); line-height:1;
      display:flex; align-items:center; justify-content:center;
      transition:transform 0.06s, box-shadow 0.06s;
      -webkit-user-select:none; user-select:none;
      touch-action:manipulation; position:relative; overflow:hidden;
    }
    .cookie-btn::before {
      content:''; position:absolute; inset:0; border-radius:50%;
      background:radial-gradient(circle at 30% 25%, rgba(255,255,255,0.15), transparent 60%);
    }
    .cookie-btn:active { transform:scale(0.9); box-shadow:0 0 20px rgba(217,119,6,0.3); }

    .click-stats {
      font-family:'Space Mono',monospace; font-size:0.68rem;
      color:var(--muted); text-align:center; flex-shrink:0; margin-bottom:0.75rem;
    }

    /* Action buttons */
    .action-btns { display:flex; gap:0.5rem; flex-wrap:wrap; justify-content:center; flex-shrink:0; margin-bottom:0.5rem; }
    .action-btn {
      padding:0.5rem 1rem; border-radius:8px;
      border:1px solid var(--border); background:var(--surface);
      color:var(--muted); font-family:'Space Mono',monospace; font-size:0.68rem;
      cursor:pointer; transition:all 0.15s; white-space:nowrap;
    }
    .action-btn:active { transform:scale(0.95); }
    .action-btn.lb  { border-color:var(--accent3); color:var(--accent3); }
    .action-btn.lb:active  { background:rgba(245,158,11,0.12); }
    .action-btn.danger:active { color:var(--red); }

    /* Click particles */
    .click-particle {
      position:fixed; pointer-events:none; z-index:999;
      font-family:'Space Mono',monospace; font-weight:700;
      font-size:0.9rem; color:var(--accent3);
      animation:floatUp 0.9s ease-out forwards;
    }
    @keyframes floatUp {
      0%   { opacity:1; transform:translateY(0) scale(1); }
      100% { opacity:0; transform:translateY(-70px) scale(0.6); }
    }

    /* ======== BUILDING ITEMS ======== */
    .building-item {
      display:flex; align-items:center; gap:0.75rem;
      padding:0.7rem 0.75rem; border-radius:10px;
      border:1px solid var(--border); background:var(--surface);
      margin-bottom:0.4rem; cursor:pointer; transition:all 0.15s; min-height:58px;
    }
    .building-item.can-buy { border-color:var(--accent); }
    .building-item.can-buy:active { background:rgba(124,58,237,0.12); transform:scale(0.98); }
    .building-item.too-exp { opacity:0.35; cursor:not-allowed; }
    .building-emoji { font-size:1.5rem; flex-shrink:0; }
    .building-info { flex:1; min-width:0; }
    .building-name { font-size:0.82rem; font-weight:700; }
    .building-cps { font-family:'Space Mono',monospace; font-size:0.62rem; color:var(--accent2); }
    .building-cost { font-family:'Space Mono',monospace; font-size:0.65rem; color:var(--accent); }
    .building-owned { font-family:'Space Mono',monospace; font-size:1rem; font-weight:700; color:var(--accent3); min-width:28px; text-align:right; flex-shrink:0; }

    /* ======== MOBILE TAB BAR ======== */
    .mobile-tabs {
      position:relative; z-index:100; display:flex; flex-shrink:0;
      height:var(--tab-h);
      background:rgba(10,10,15,0.97); border-top:1px solid var(--border);
    }
    .mob-tab {
      flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:0.2rem; cursor:pointer; border:none; background:transparent;
      color:var(--muted); transition:color 0.2s;
      font-family:'Space Mono',monospace; font-size:0.58rem; letter-spacing:0.04em;
      padding-bottom:env(safe-area-inset-bottom, 0);
    }
    .mob-tab .tab-icon { font-size:1.35rem; line-height:1; }
    .mob-tab.active { color:var(--accent3); }
    .mob-tab.active .tab-icon { filter:drop-shadow(0 0 6px var(--accent3)); }

    /* ======== TOAST ======== */
    .toast {
      position:fixed; bottom:calc(var(--tab-h) + 0.75rem); left:50%;
      transform:translateX(-50%) translateY(20px);
      background:var(--surface); border:1px solid var(--border);
      border-radius:10px; padding:0.65rem 1.25rem;
      font-family:'Space Mono',monospace; font-size:0.75rem;
      z-index:998; transition:transform 0.3s, opacity 0.3s;
      opacity:0; white-space:nowrap; max-width:92vw;
    }
    @media(min-width:768px) { .toast { bottom:1.5rem; } }
    .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

    /* LOGIN BANNER */
    .login-banner {
      position:relative; z-index:60; flex-shrink:0;
      background:linear-gradient(135deg,rgba(124,58,237,0.92),rgba(6,182,212,0.92));
      backdrop-filter:blur(10px); padding:0.6rem 1rem;
      display:flex; align-items:center; justify-content:space-between; gap:0.75rem;
    }
    .login-banner p { font-family:'Space Mono',monospace; font-size:0.7rem; }
    .login-banner a {
      padding:0.4rem 0.9rem; background:#fff; color:#111;
      border-radius:6px; font-family:'Space Mono',monospace;
      font-size:0.7rem; font-weight:700; text-decoration:none; white-space:nowrap; flex-shrink:0;
    }
    #login-banner-wrap { flex-shrink:0; }

    /* GOLDEN COOKIE */
    .golden-cookie {
      position:fixed; cursor:pointer; z-index:200; font-size:2.5rem;
      filter:drop-shadow(0 0 15px gold); display:none;
      animation:goldenFloat 10s ease-in-out forwards;
    }
    @keyframes goldenFloat {
      0%   { opacity:0; transform:scale(0); }
      10%  { opacity:1; transform:scale(1) rotate(-10deg); }
      90%  { opacity:1; transform:scale(1) rotate(10deg); }
      100% { opacity:0; transform:scale(0); }
    }

    /* ======== LEADERBOARD MODAL ======== */
    .modal-overlay {
      position:fixed; inset:0; z-index:500;
      background:rgba(0,0,0,0.8); backdrop-filter:blur(8px);
      display:flex; align-items:flex-end; justify-content:center;
      opacity:0; pointer-events:none; transition:opacity 0.25s;
    }
    @media(min-width:768px) { .modal-overlay { align-items:center; } }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal {
      background:var(--surface); border:1px solid var(--border);
      border-radius:20px 20px 0 0;
      width:100%; max-height:88vh;
      display:flex; flex-direction:column; overflow:hidden;
      transform:translateY(60px);
      transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    @media(min-width:768px) {
      .modal { border-radius:20px; width:min(620px,96vw); max-height:85vh; }
    }
    .modal-overlay.open .modal { transform:translateY(0); }
    .modal-handle {
      width:40px; height:4px; border-radius:2px;
      background:var(--border); margin:0.75rem auto 0; flex-shrink:0;
    }
    @media(min-width:768px) { .modal-handle { display:none; } }
    .modal-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:1rem 1.5rem 0.75rem; border-bottom:1px solid var(--border); flex-shrink:0;
    }
    .modal-title { font-size:1.2rem; font-weight:800; display:flex; align-items:center; gap:0.6rem; }
    .modal-close {
      width:32px; height:32px; border-radius:50%;
      background:transparent; border:1px solid var(--border);
      color:var(--muted); font-size:1rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center; transition:all 0.2s;
    }
    .modal-tabs { display:flex; border-bottom:1px solid var(--border); flex-shrink:0; }
    .modal-tab {
      flex:1; padding:0.6rem 0.25rem; text-align:center;
      font-family:'Space Mono',monospace; font-size:0.65rem;
      cursor:pointer; color:var(--muted); border:none;
      background:transparent; transition:all 0.2s;
    }
    .modal-tab.active { color:var(--accent3); border-bottom:2px solid var(--accent3); }
    .modal-body { overflow-y:auto; flex:1; padding:0.75rem 1rem 1rem; -webkit-overflow-scrolling:touch; }
    .modal-body::-webkit-scrollbar { width:3px; }
    .modal-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
    .lb-row {
      display:grid; grid-template-columns:32px 1fr 100px 90px;
      align-items:center; gap:0.5rem;
      padding:0.65rem 0.5rem; border-radius:10px; margin-bottom:0.3rem;
    }
    @media(max-width:380px) { .lb-row { grid-template-columns:28px 1fr 80px; } .lb-val-sec { display:none; } }
    .lb-row:hover { background:rgba(255,255,255,0.03); }
    .lb-row.lb-me { background:rgba(124,58,237,0.12); border:1px solid rgba(124,58,237,0.25); }
    .lb-row.lb-header { color:var(--muted); font-family:'Space Mono',monospace; font-size:0.58rem; letter-spacing:0.12em; text-transform:uppercase; padding-bottom:0.4rem; margin-bottom:0.2rem; border-bottom:1px solid var(--border); }
    .lb-rank { font-family:'Space Mono',monospace; font-size:0.85rem; font-weight:700; text-align:center; }
    .lb-rank-1 { color:#eab308; } .lb-rank-2 { color:#94a3b8; } .lb-rank-3 { color:#b45309; }
    .lb-user { display:flex; align-items:center; gap:0.5rem; min-width:0; }
    .lb-avatar { width:26px; height:26px; border-radius:50%; flex-shrink:0; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex; align-items:center; justify-content:center; font-size:0.7rem; font-weight:700; }
    .lb-username { font-weight:700; font-size:0.8rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .lb-you { font-family:'Space Mono',monospace; font-size:0.55rem; color:var(--accent); margin-left:0.25rem; }
    .lb-val { font-family:'Space Mono',monospace; font-size:0.75rem; color:var(--accent3); text-align:right; }
    .lb-val-sec { font-family:'Space Mono',monospace; font-size:0.75rem; color:var(--accent2); text-align:right; }
    .lb-empty { text-align:center; padding:2.5rem 1rem; font-family:'Space Mono',monospace; font-size:0.78rem; color:var(--muted); }
    .lb-meta { display:flex; align-items:center; justify-content:space-between; padding:0.5rem 0.75rem 0.75rem; font-family:'Space Mono',monospace; font-size:0.62rem; color:var(--muted); }
    .lb-refresh-btn { background:transparent; border:1px solid var(--border); border-radius:6px; padding:0.3rem 0.7rem; color:var(--muted); font-family:'Space Mono',monospace; font-size:0.62rem; cursor:pointer; transition:all 0.2s; }

    body.prestige .cookie-btn { animation:prestigeGlow 2s ease infinite; }
    @keyframes prestigeGlow { 0%,100%{box-shadow:0 0 40px rgba(217,119,6,0.4);} 50%{box-shadow:0 0 80px rgba(217,119,6,0.9),0 0 120px rgba(124,58,237,0.5);} }
    footer { display:none; }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">AXO<span>BOYS</span></a>
  <div class="nav-right">
    <span class="save-indicator" id="save-indicator">✓ Sauvegardé</span>
    <a href="profile.html" id="nav-user-link">Mon profil</a>
    <a href="index.html">Hub</a>
  </div>
</nav>

<div id="login-banner-wrap"></div>

<div class="game-wrapper">

  <!-- LEFT: UPGRADES -->
  <div class="panel panel-left" id="panel-upgrades">
    <div class="panel-title">// Améliorations</div>
    <div class="upgrade-list" id="upgrade-list"></div>
  </div>

  <!-- CENTER: CLICK -->
  <div class="panel panel-center" id="panel-game">
    <div class="cookie-counter-box">
      <div class="cookie-count-main" id="cookie-count">0</div>
      <div class="cookie-count-sub">🍪 cookies</div>
      <div class="cps-display" id="cps-display">0 cookies/sec</div>
    </div>
    <div class="cookie-wrap">
      <button class="cookie-btn" id="cookie-btn">🍪</button>
    </div>
    <div class="click-stats" id="click-stats">Appuie sur le cookie !</div>
    <div class="action-btns">
      <button class="action-btn" onclick="saveGame()">💾 Sauvegarder</button>
      <button class="action-btn lb" onclick="openLeaderboard()">🏆 Classement</button>
      <button class="action-btn danger" onclick="confirmReset()">🗑 Reset</button>
    </div>
  </div>

  <!-- RIGHT: BUILDINGS -->
  <div class="panel panel-right" id="panel-buildings">
    <div class="panel-title">// Bâtiments</div>
    <div class="building-list" id="building-list"></div>
  </div>

</div>

<!-- MOBILE TAB BAR -->
<div class="mobile-tabs" id="mobile-tabs">
  <button class="mob-tab" id="tab-upg" onclick="switchMobTab('upgrades')">
    <span class="tab-icon">✨</span><span>Amélios</span>
  </button>
  <button class="mob-tab active" id="tab-game" onclick="switchMobTab('game')">
    <span class="tab-icon">🍪</span><span>Jouer</span>
  </button>
  <button class="mob-tab" id="tab-bld" onclick="switchMobTab('buildings')">
    <span class="tab-icon">🏗</span><span>Bâtiments</span>
  </button>
</div>

<div class="golden-cookie" id="golden-cookie" onclick="goldenClick()">✨</div>
<div class="toast" id="toast"></div>

<!-- LEADERBOARD MODAL -->
<div class="modal-overlay" id="lb-overlay" onclick="closeLbIfOutside(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">🏆 Classement Global</div>
      <button class="modal-close" onclick="closeLeaderboard()">✕</button>
    </div>
    <div class="modal-tabs">
      <button class="modal-tab active" id="tab-cookies" onclick="switchLbTab('cookies')">🍪 Cookies</button>
      <button class="modal-tab" id="tab-cps"     onclick="switchLbTab('cps')">⚡ /sec</button>
      <button class="modal-tab" id="tab-clicks"  onclick="switchLbTab('clicks')">🖱 Clics</button>
    </div>
    <div class="modal-body" id="lb-body"><div class="lb-empty">Chargement...</div></div>
    <div class="lb-meta">
      <span id="lb-count">0 joueurs</span>
      <button class="lb-refresh-btn" onclick="renderLeaderboard()">↻ Actualiser</button>
    </div>
  </div>
</div>

<script>
// ====================================================
// MOBILE TABS
// ====================================================
function switchMobTab(tab) {
  const pl = document.getElementById('panel-upgrades');
  const pc = document.getElementById('panel-game');
  const pr = document.getElementById('panel-buildings');
  pl.classList.remove('mob-show');
  pr.classList.remove('mob-show');
  pc.style.display = '';
  if (tab === 'upgrades')  { pl.classList.add('mob-show'); pc.style.display = 'none'; }
  if (tab === 'buildings') { pr.classList.add('mob-show'); pc.style.display = 'none'; }
  document.getElementById('tab-upg').classList.toggle('active', tab === 'upgrades');
  document.getElementById('tab-game').classList.toggle('active', tab === 'game');
  document.getElementById('tab-bld').classList.toggle('active', tab === 'buildings');
}

// ====================================================
// GAME DATA
// ====================================================
const BUILDINGS = [
  { id:'cursor',  emoji:'🖱', name:'Curseur',       baseCost:15,     baseCps:1,      desc:'Clique tout seul...' },
  { id:'grandma', emoji:'👵', name:'Grand-mère',    baseCost:100,    baseCps:5,      desc:'Fait des cookies avec amour' },
  { id:'farm',    emoji:'🌾', name:'Ferme',         baseCost:1100,   baseCps:20,     desc:'Cultive des cookies' },
  { id:'mine',    emoji:'⛏',  name:'Mine',          baseCost:12000,  baseCps:80,     desc:'Extrait des pépites de cookies' },
  { id:'factory', emoji:'🏭', name:'Usine',         baseCost:130000, baseCps:300,    desc:'Produit des cookies en masse' },
  { id:'bank',    emoji:'🏦', name:'Banque',        baseCost:1.4e6,  baseCps:1000,   desc:'Génère des intérêts en cookies' },
  { id:'temple',  emoji:'⛩',  name:'Temple',        baseCost:2e7,    baseCps:4000,   desc:'Cookies bénis par les dieux' },
  { id:'wizard',  emoji:'🧙', name:'Tour de mage',  baseCost:3.3e8,  baseCps:16000,  desc:'Conjure des cookies magiques' },

const UPGRADES = [
  { id:'click1', emoji:'👆', name:"Doigt d'acier",    cost:100,    desc:'×2/clic',    effect:'click',    mult:2 },

  { id:'click3', emoji:'🤛', name:'Frappe divine',     cost:10000,  desc:'×2/clic',    effect:'click',    mult:2 },
  { id:'click4', emoji:'⚡', name:'Éclair de clic',    cost:200000, desc:'×3/clic',    effect:'click',    mult:3 },
  { id:'click5', emoji:'🌩', name:'Tonnerre de doigt', cost:5e6,    desc:'×5/clic',    effect:'click',    mult:5 },
  { id:'cur1',   emoji:'🖱', name:'Souris rapide',     cost:500,    desc:'Curseurs ×2',effect:'building', bid:'cursor',  mult:2 },
  { id:'cur2',   emoji:'🖱', name:'Souris optique',    cost:5000,   desc:'Curseurs ×2',effect:'building', bid:'cursor',  mult:2 },
  { id:'gma1',   emoji:'👵', name:'Tablier brodé',     cost:2000,   desc:'GM ×2',      effect:'building', bid:'grandma', mult:2 },
  { id:'gma2',   emoji:'👵', name:'Lunettes magiques', cost:20000,  desc:'GM ×2',      effect:'building', bid:'grandma', mult:2 },

  { id:'frm1',   emoji:'🌾', name:'Engrais ultra',     cost:50000,  desc:'Fermes ×2',  effect:'building', bid:'farm',    mult:2 },
  { id:'frm2',   emoji:'🌾', name:'OGM Cookies',       cost:500000, desc:'Fermes ×2',  effect:'building', bid:'farm',    mult:2 },
  { id:'min1',   emoji:'⛏', name:'Dynamite cookies',  cost:600000, desc:'Mines ×2',   effect:'building', bid:'mine',    mult:2 },
  { id:'min2',   emoji:'⛏', name:'Laser mineur',      cost:6e6,    desc:'Mines ×2',   effect:'building', bid:'mine',    mult:2 },
  { id:'glob1',  emoji:'✨', name:'Magie des cookies', cost:1e7,    desc:'Prod ×2',    effect:'global',   mult:2 },
  { id:'glob2',  emoji:'🌟', name:'Frappe cosmique',   cost:1e9,    desc:'Prod ×2',    effect:'global',   mult:2 },
  { id:'glob3',  emoji:'🌌', name:'Singularité',       cost:1e12,   desc:'Prod ×3',    effect:'global',   mult:3 },
  { id:'golden1',emoji:'🌕', name:'Cookie doré',       cost:5e5,    desc:'Bonus rare+',effect:'golden' },
  { id:'acidic1',emoji:'🦎', name:"Bénédiction d'Acidic",cost:1e8,  desc:'Curseurs ×3',effect:'building', bid:'cursor',  mult:3 },
  { id:'chloé1', emoji:'🦎', name:"Bénédiction de Chloé",cost:1e9,  desc:'GM ×3',      effect:'building', bid:'grandma', mult:3 },
  { id:'mat1',   emoji:'🦎', name:"Bénédiction de Mat", cost:1e10,  desc:'Fermes ×3',  effect:'building', bid:'farm',    mult:3 },
  { id:'fana1',  emoji:'🦎', name:"Bénédiction de Fana",cost:1e11,  desc:'Mines ×3',   effect:'building', bid:'mine',    mult:3 },
  { id:'hestia1',emoji:'🦎', name:"Bénédiction de Hestia",cost:2e11,desc:'Mines ×3',   effect:'building', bid:'mine',    mult:3 },
  { id:'mano1',  emoji:'🦎', name:'Bénédiction de la Main',cost:5e11,desc:'Prod ×2',   effect:'global',   mult:2 },
  { id:'axo1',   emoji:'🦎', name:"Bénédiction d'Axo", cost:1e12,   desc:'Tout ×3.5',  effect:'global',   mult:3 },
];

// ====================================================
// STATE
// ====================================================
let state = {
  cookies:0, totalCookies:0, totalClicks:0,
  buildings:{}, upgrades:{}, clickMult:1, globalMult:1, buildingMult:{},
};
BUILDINGS.forEach(b => { state.buildings[b.id]=0; state.buildingMult[b.id]=1; });

// ====================================================
// AUTH / SAVE / LOAD
// ====================================================
function getUsers()       { try { return JSON.parse(localStorage.getItem('axo_users')||'{}'); } catch(e) { return {}; } }
function saveUsers(u)     { localStorage.setItem('axo_users', JSON.stringify(u)); }
function getCurrentUser() { try { return JSON.parse(localStorage.getItem('axo_user')); } catch(e) { return null; } }

const currentUser = getCurrentUser();
const userKey = currentUser ? currentUser.username.toLowerCase() : null;

if (!currentUser) {
  document.getElementById('login-banner-wrap').innerHTML = `
    <div class="login-banner">
      <p>🔐 Connecte-toi pour sauvegarder ta progression !</p>
      <a href="login.html">Se connecter →</a>
    </div>`;
} else {
  document.getElementById('nav-user-link').textContent = '👤 ' + currentUser.username;
  loadGame();
}

function getStateToSave() {
  return { cookies:state.cookies, totalCookies:state.totalCookies, totalClicks:state.totalClicks,
           cps:computeCps(), buildings:{...state.buildings}, upgrades:{...state.upgrades} };
}

function saveGame() {
  if (!currentUser) {
    localStorage.setItem('axo_clicker_guest', JSON.stringify(getStateToSave()));
    showToast('💾 Sauvegardé localement'); return;
  }
  const users = getUsers(); if (!users[userKey]) return;
  users[userKey].clicker = getStateToSave(); saveUsers(users);
  const ind = document.getElementById('save-indicator');
  ind.style.display = 'inline'; setTimeout(() => ind.style.display='none', 2000);
  showToast('✓ Progression sauvegardée !');
}

function loadGame() {
  let saved = null;
  if (currentUser) { const u = getUsers(); saved = u[userKey]?.clicker; }
  else { try { saved = JSON.parse(localStorage.getItem('axo_clicker_guest')); } catch(e){} }
  if (!saved) return;
  state.cookies=saved.cookies||0; state.totalCookies=saved.totalCookies||0; state.totalClicks=saved.totalClicks||0;
  if (saved.buildings) Object.assign(state.buildings, saved.buildings);
  if (saved.upgrades)  Object.assign(state.upgrades, saved.upgrades);
  recomputeMultipliers();
}

setInterval(saveGame, 30000);

// ====================================================
// GAME LOGIC
// ====================================================
function recomputeMultipliers() {
  state.clickMult=1; state.globalMult=1;
  BUILDINGS.forEach(b => state.buildingMult[b.id]=1);
  UPGRADES.forEach(u => {
    if (!state.upgrades[u.id]) return;
    if (u.effect==='click')    state.clickMult *= u.mult;
    if (u.effect==='global')   state.globalMult *= u.mult;
    if (u.effect==='building') state.buildingMult[u.bid] = (state.buildingMult[u.bid]||1) * u.mult;
  });
}

function getBuildingCost(b) { return Math.ceil(b.baseCost * Math.pow(1.15, state.buildings[b.id]||0)); }

function computeCps() {
  let cps=0;
  BUILDINGS.forEach(b => cps += (state.buildings[b.id]||0) * b.baseCps * (state.buildingMult[b.id]||1));
  return cps * state.globalMult;
}

function getClickValue() {
  return Math.max(1, computeCps()*0.01) * state.clickMult * state.globalMult;
}

// ====================================================
// CLICK — mouse + multi-touch
// ====================================================
const cookieBtn = document.getElementById('cookie-btn');

function handleCookieClick(cx, cy) {
  const val = getClickValue();
  state.cookies += val; state.totalCookies += val; state.totalClicks++;
  spawnParticle(cx, cy, '+' + formatNum(val));
  updateDisplay();
}

cookieBtn.addEventListener('click', e => handleCookieClick(e.clientX, e.clientY));
cookieBtn.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) handleCookieClick(t.clientX, t.clientY);
}, { passive:false });

function spawnParticle(x, y, text) {
  const el = document.createElement('div');
  el.className = 'click-particle';
  el.textContent = text;
  el.style.left = (x - 15 + (Math.random()-0.5)*30) + 'px';
  el.style.top  = (y - 10) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

// ====================================================
// BUY BUILDING / UPGRADE
// ====================================================
function buyBuilding(id) {
  const b = BUILDINGS.find(x => x.id===id); if (!b) return;
  const cost = getBuildingCost(b); if (state.cookies < cost) return;
  state.cookies -= cost; state.buildings[id] = (state.buildings[id]||0)+1;
  showToast(b.emoji + ' ' + b.name + ' acheté !'); updateDisplay();
}

function buyUpgrade(id) {
  const u = UPGRADES.find(x => x.id===id); if (!u || state.upgrades[id]) return;
  if (state.cookies < u.cost) return;
  state.cookies -= u.cost; state.upgrades[id]=true;
  recomputeMultipliers();
  showToast(u.emoji + ' ' + u.name + ' débloqué !'); updateDisplay();
}

// ====================================================
// GOLDEN COOKIE
// ====================================================
let goldenTimer=null;
function scheduleGoldenCookie() { clearTimeout(goldenTimer); goldenTimer=setTimeout(showGoldenCookie, 60000+Math.random()*120000); }
function showGoldenCookie() {
  const gc=document.getElementById('golden-cookie');
  gc.style.display='block';
  gc.style.left=(60+Math.random()*(window.innerWidth-120))+'px';
  gc.style.top=(80+Math.random()*(window.innerHeight-200))+'px';
  gc.style.animation='none'; gc.offsetHeight; gc.style.animation='goldenFloat 10s ease-in-out forwards';
  setTimeout(()=>{ gc.style.display='none'; scheduleGoldenCookie(); }, 10000);
}
function goldenClick() {
  const bonus=Math.max(13, computeCps()*77);
  state.cookies+=bonus; state.totalCookies+=bonus;
  document.getElementById('golden-cookie').style.display='none';
  spawnParticle(window.innerWidth/2, window.innerHeight/2, '✨ +'+formatNum(bonus));
  showToast('✨ Cookie doré ! +'+formatNum(bonus));
  scheduleGoldenCookie(); updateDisplay();
}
scheduleGoldenCookie();

// ====================================================
// CPS TICK
// ====================================================
let lastTick=Date.now();
setInterval(()=>{
  const now=Date.now(), dt=(now-lastTick)/1000; lastTick=now;
  const cps=computeCps();
  state.cookies+=cps*dt; state.totalCookies+=cps*dt;
  updateDisplay();
}, 50);

// ====================================================
// FORMAT & DISPLAY
// ====================================================
function formatNum(n) {
  n=Math.floor(n);
  if(n>=1e15) return (n/1e15).toFixed(2)+' Qa';
  if(n>=1e12) return (n/1e12).toFixed(2)+' T';
  if(n>=1e9)  return (n/1e9).toFixed(2)+' B';
  if(n>=1e6)  return (n/1e6).toFixed(2)+' M';
  if(n>=1e3)  return (n/1e3).toFixed(1)+' K';
  return n.toString();
}

function updateDisplay() {
  const cps=computeCps();
  document.getElementById('cookie-count').textContent = formatNum(state.cookies);
  document.getElementById('cps-display').textContent  = formatNum(cps)+' cookies/sec';
  document.getElementById('click-stats').textContent  = '🖱 '+state.totalClicks.toLocaleString('fr')+' clics  •  ⚡ +'+formatNum(getClickValue())+'/tap';
  renderBuildings(); renderUpgrades(); updateTabDots();
}

function updateTabDots() {
  const hasU = UPGRADES.some(u => !state.upgrades[u.id] && state.cookies >= u.cost);
  const hasB = BUILDINGS.some(b => state.cookies >= getBuildingCost(b));
  document.querySelector('#tab-upg .tab-icon').textContent = hasU ? '✨🔴' : '✨';
  document.querySelector('#tab-bld .tab-icon').textContent = hasB ? '🏗🟢' : '🏗';
}

// ====================================================
// DOM — built once, updated in place
// ====================================================
let bldBuilt=false, upgBuilt=false;

function buildBuildingDOM() {
  const list=document.getElementById('building-list'); list.innerHTML='';
  BUILDINGS.forEach(b=>{
    const el=document.createElement('div');
    el.className='building-item too-exp'; el.id='bld-'+b.id;
    el.innerHTML=`<div class="building-emoji">${b.emoji}</div>
      <div class="building-info">
        <div class="building-name">${b.name}</div>
        <div class="building-cps" id="bld-cps-${b.id}">…</div>
        <div class="building-cost" id="bld-cost-${b.id}">🍪 …</div>
      </div>
      <div class="building-owned" id="bld-count-${b.id}">0</div>`;
    const handler=()=>{ if(state.cookies>=getBuildingCost(b)) buyBuilding(b.id); };
    el.addEventListener('click', handler);
    el.addEventListener('touchend', e=>{ e.preventDefault(); handler(); }, {passive:false});
    list.appendChild(el);
  });
  bldBuilt=true;
}

function buildUpgradeDOM() {
  const list=document.getElementById('upgrade-list'); list.innerHTML='';
  UPGRADES.forEach(u=>{
    const el=document.createElement('div');
    el.className='upgrade-item'; el.id='upg-'+u.id;
    el.innerHTML=`<div class="upgrade-emoji">${u.emoji}</div>
      <div class="upgrade-info">
        <div class="upgrade-name">${u.name}</div>
        <div class="upgrade-desc">${u.desc}</div>
        <div class="upgrade-cost" id="upg-cost-${u.id}">🍪 ${formatNum(u.cost)}</div>
      </div>`;
    const handler=()=>{ if(!state.upgrades[u.id]&&state.cookies>=u.cost) buyUpgrade(u.id); };
    el.addEventListener('click', handler);
    el.addEventListener('touchend', e=>{ e.preventDefault(); handler(); }, {passive:false});
    list.appendChild(el);
  });
  upgBuilt=true;
}

function renderBuildings() {
  if (!bldBuilt) buildBuildingDOM();
  BUILDINGS.forEach(b=>{
    const count=state.buildings[b.id]||0, cost=getBuildingCost(b), canBuy=state.cookies>=cost;
    const realCps=b.baseCps*(state.buildingMult[b.id]||1)*state.globalMult;
    const el=document.getElementById('bld-'+b.id); if(!el) return;
    el.className='building-item '+(canBuy?'can-buy':'too-exp');
    document.getElementById('bld-cps-'+b.id).textContent=formatNum(realCps)+'/sec chacun';
    document.getElementById('bld-cost-'+b.id).textContent='🍪 '+formatNum(cost);
    document.getElementById('bld-count-'+b.id).textContent=count;
  });
}

function renderUpgrades() {
  if (!upgBuilt) buildUpgradeDOM();
  UPGRADES.forEach(u=>{
    const bought=!!state.upgrades[u.id], canBuy=!bought&&state.cookies>=u.cost;
    const el=document.getElementById('upg-'+u.id); if(!el) return;
    el.className='upgrade-item'+(bought?' bought':canBuy?' can-buy':'');
    const costEl=document.getElementById('upg-cost-'+u.id);
    if(costEl) costEl.textContent=bought?'✓ Acheté':'🍪 '+formatNum(u.cost);
  });
}

// ====================================================
// TOAST & RESET
// ====================================================
let toastTimer;
function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}

function confirmReset() {
  if(confirm('🗑 Remettre la progression à zéro ? Irréversible !')) {
    state.cookies=0; state.totalCookies=0; state.totalClicks=0;
    BUILDINGS.forEach(b=>state.buildings[b.id]=0); state.upgrades={};
    recomputeMultipliers(); saveGame(); updateDisplay();
    showToast('Progression remise à zéro.');
  }
}

// ====================================================
// KEYBOARD (desktop)
// ====================================================
document.addEventListener('keydown', e=>{
  if(e.key===' '&&e.target.tagName!=='INPUT') {
    e.preventDefault();
    const r=cookieBtn.getBoundingClientRect();
    handleCookieClick(r.left+r.width/2, r.top+r.height/2);
  }
  if(e.key==='s'&&(e.ctrlKey||e.metaKey)){ e.preventDefault(); saveGame(); }
  if(e.key==='Escape') closeLeaderboard();
});

// ====================================================
// LEADERBOARD
// ====================================================
let lbCurrentTab='cookies';

async function pushScoreToGlobal() {
  if(!currentUser) return;
  const score={username:currentUser.username,cookies:Math.floor(state.totalCookies),cps:Math.round(computeCps()*100)/100,clicks:state.totalClicks,updatedAt:Date.now()};
  try { await window.storage.set('lb:'+userKey, JSON.stringify(score), true); } catch(e){}
}

async function fetchGlobalScores() {
  try {
    const result=await window.storage.list('lb:', true);
    if(!result||!result.keys) return [];
    const scores=[];
    for(const key of result.keys){
      try { const r=await window.storage.get(key,true); if(r&&r.value) scores.push(JSON.parse(r.value)); } catch(e){}
    }
    return scores;
  } catch(e){ return []; }
}

function openLeaderboard() { saveGame(); document.getElementById('lb-overlay').classList.add('open'); renderLeaderboard(); }
function closeLeaderboard() { document.getElementById('lb-overlay').classList.remove('open'); }
function closeLbIfOutside(e) { if(e.target===document.getElementById('lb-overlay')) closeLeaderboard(); }

function switchLbTab(tab) {
  lbCurrentTab=tab;
  document.querySelectorAll('.modal-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  renderLeaderboard();
}

async function renderLeaderboard() {
  const body=document.getElementById('lb-body');
  body.innerHTML='<div class="lb-empty">⏳ Chargement...</div>';
  await pushScoreToGlobal();
  let entries=await fetchGlobalScores();

  if(entries.length===0) {
    const users=getUsers();
    Object.values(users).forEach(u=>{
      if(!u.username) return;
      const c=u.clicker||{};
      entries.push({username:u.username,cookies:Math.floor(c.totalCookies||0),cps:c.cps||0,clicks:c.totalClicks||0});
    });
  }

  document.getElementById('lb-count').textContent=entries.length+' joueur'+(entries.length!==1?'s':'');
  if(entries.length===0){ body.innerHTML='<div class="lb-empty">Aucun joueur pour l\'instant !<br>Crée un compte pour apparaître ici.</div>'; return; }

  const sortKey=lbCurrentTab==='cps'?'cps':lbCurrentTab==='clicks'?'clicks':'cookies';
  entries.sort((a,b)=>b[sortKey]-a[sortKey]);
  const meKey=currentUser?currentUser.username.toLowerCase():null;
  const medals=['🥇','🥈','🥉'];

  let html=`<div class="lb-row lb-header"><div>#</div><div>Joueur</div><div style="text-align:right">${lbCurrentTab==='cookies'?'Total':lbCurrentTab==='cps'?'/sec':'Clics'}</div><div style="text-align:right">${lbCurrentTab==='cookies'?'/sec':'Total'}</div></div>`;

  entries.forEach((e,i)=>{
    const isMe=meKey&&e.username.toLowerCase()===meKey;
    const rankLabel=i<3?`<span class="lb-rank-${i+1}">${medals[i]}</span>`:`<span style="color:var(--muted)">${i+1}</span>`;
    const mainVal=lbCurrentTab==='cps'?formatNum(e.cps)+'/s':lbCurrentTab==='clicks'?formatNum(e.clicks):formatNum(e.cookies);
    const secVal=lbCurrentTab==='cookies'?formatNum(e.cps)+'/s':formatNum(e.cookies);
    html+=`<div class="lb-row${isMe?' lb-me':''}">
      <div class="lb-rank">${rankLabel}</div>
      <div class="lb-user"><div class="lb-avatar">${e.username[0].toUpperCase()}</div>
        <div class="lb-username">${e.username}${isMe?'<span class="lb-you">(toi)</span>':''}</div></div>
      <div class="lb-val">${mainVal}</div>
      <div class="lb-val-sec">${secVal}</div>
    </div>`;
  });
  body.innerHTML=html;
}

if(currentUser) setInterval(pushScoreToGlobal, 60000);

// ====================================================
// INIT
// ====================================================
updateDisplay();
</script>
</body>
</html>

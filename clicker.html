<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>AxoClicker 🍪</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0a0f;--surface:#111118;--border:#1e1e2e;--accent:#7c3aed;--accent2:#06b6d4;--accent3:#f59e0b;--text:#e2e8f0;--muted:#64748b;--glow:rgba(124,58,237,0.3);--green:#22c55e;--red:#ef4444;--nav-h:52px;--tab-h:64px;}
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;overflow:hidden;}
    body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;display:flex;flex-direction:column;}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(124,58,237,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(124,58,237,0.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}

    /* NAV */
    nav{position:relative;z-index:100;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 1rem;height:var(--nav-h);background:rgba(10,10,15,0.97);border-bottom:1px solid var(--border);}
    .nav-logo{font-size:1rem;font-weight:800;letter-spacing:0.1em;color:var(--text);text-decoration:none;}
    .nav-logo span{color:var(--accent);}
    .nav-right{display:flex;align-items:center;gap:0.75rem;}
    .nav-right a{font-family:'Space Mono',monospace;font-size:0.65rem;color:var(--muted);text-decoration:none;transition:color 0.2s;}
    .nav-right a:hover{color:var(--accent2);}
    .save-indicator{font-family:'Space Mono',monospace;font-size:0.62rem;color:var(--green);display:none;}
    .rebirth-badge{font-family:'Space Mono',monospace;font-size:0.62rem;color:#a855f7;display:none;}

    /* LAYOUT */
    .game-wrapper{flex:1;overflow:hidden;position:relative;z-index:1;display:flex;flex-direction:column;}
    @media(min-width:768px){
      .game-wrapper{flex-direction:row;}
      .mobile-tabs{display:none!important;}
      .panel-left{width:255px;flex-shrink:0;border-right:1px solid var(--border);display:flex!important;position:static!important;}
      .panel-right{width:270px;flex-shrink:0;border-left:1px solid var(--border);display:flex!important;position:static!important;}
      .panel-center{flex:1;}
    }
    .panel{display:flex;flex-direction:column;overflow:hidden;}
    @media(max-width:767px){
      .panel-left,.panel-right{display:none;position:fixed;inset:var(--nav-h) 0 var(--tab-h) 0;z-index:50;background:var(--bg);}
      .panel-left.mob-show,.panel-right.mob-show{display:flex;}
      .panel-center{flex:1;}
    }
    .panel-title{padding:0.6rem 1rem;font-family:'Space Mono',monospace;font-size:0.62rem;color:var(--accent);letter-spacing:0.2em;text-transform:uppercase;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
    .panel-title-sub{color:var(--muted);font-size:0.58rem;}

    /* LISTS */
    .upgrade-list,.building-list,.rebirth-shop-list{flex:1;overflow-y:auto;padding:0.4rem;-webkit-overflow-scrolling:touch;}
    .upgrade-list::-webkit-scrollbar,.building-list::-webkit-scrollbar,.rebirth-shop-list::-webkit-scrollbar{width:3px;}
    .upgrade-list::-webkit-scrollbar-thumb,.building-list::-webkit-scrollbar-thumb,.rebirth-shop-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

    /* UPGRADE ITEMS */
    .upgrade-item{display:flex;align-items:center;gap:0.65rem;padding:0.65rem 0.75rem;border-radius:10px;border:1px solid var(--border);background:var(--surface);margin-bottom:0.35rem;cursor:pointer;transition:all 0.15s;min-height:52px;}
    .upgrade-item.can-buy{border-color:var(--accent3);}
    .upgrade-item.can-buy:active{background:rgba(245,158,11,0.12);transform:scale(0.98);}
    .upgrade-item.bought{opacity:0.3;cursor:default;}
    .upgrade-emoji{font-size:1.2rem;flex-shrink:0;}
    .upgrade-info{flex:1;min-width:0;}
    .upgrade-name{font-size:0.8rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .upgrade-cost{font-family:'Space Mono',monospace;font-size:0.63rem;color:var(--accent3);margin-top:0.1rem;}
    .upgrade-desc{font-family:'Space Mono',monospace;font-size:0.57rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

    /* CENTER */
    .panel-center{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0.75rem 1rem 0.25rem;overflow:hidden;}
    .cookie-counter-box{text-align:center;margin-bottom:0.75rem;flex-shrink:0;}
    .cookie-count-main{font-size:clamp(1.4rem,6vw,2.8rem);font-weight:800;font-family:'Space Mono',monospace;color:var(--accent3);line-height:1;}
    .cookie-count-sub{font-family:'Space Mono',monospace;font-size:0.65rem;color:var(--muted);margin-top:0.2rem;}
    .cps-display{font-family:'Space Mono',monospace;font-size:0.68rem;color:var(--accent2);margin-top:0.1rem;}
    .rebirth-info{font-family:'Space Mono',monospace;font-size:0.62rem;color:#a855f7;margin-top:0.1rem;}
    .cookie-wrap{position:relative;margin-bottom:0.75rem;flex-shrink:0;}
    .cookie-btn{width:clamp(120px,34vw,170px);height:clamp(120px,34vw,170px);border-radius:50%;border:none;cursor:pointer;background:radial-gradient(circle at 35% 35%,#d97706,#92400e);box-shadow:0 0 40px rgba(217,119,6,0.4),0 8px 30px rgba(0,0,0,0.5);font-size:clamp(2.5rem,9vw,4.5rem);line-height:1;display:flex;align-items:center;justify-content:center;transition:transform 0.06s,box-shadow 0.06s;-webkit-user-select:none;user-select:none;touch-action:manipulation;position:relative;overflow:hidden;}
    .cookie-btn::before{content:'';position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 30% 25%,rgba(255,255,255,0.15),transparent 60%);}
    .cookie-btn:active{transform:scale(0.9);box-shadow:0 0 20px rgba(217,119,6,0.3);}
    .click-stats{font-family:'Space Mono',monospace;font-size:0.63rem;color:var(--muted);text-align:center;flex-shrink:0;margin-bottom:0.5rem;}
    .action-btns{display:flex;gap:0.4rem;flex-wrap:wrap;justify-content:center;flex-shrink:0;margin-bottom:0.4rem;}
    .action-btn{padding:0.42rem 0.75rem;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:'Space Mono',monospace;font-size:0.62rem;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
    .action-btn:active{transform:scale(0.95);}
    .action-btn.lb{border-color:var(--accent3);color:var(--accent3);}
    .action-btn.rebirth-btn{border-color:#a855f7;color:#a855f7;}
    .action-btn.rebirth-btn:active{background:rgba(168,85,247,0.12);}
    .action-btn.shop-btn{border-color:var(--accent2);color:var(--accent2);}
    .action-btn.danger:active{color:var(--red);}

    /* PARTICLES */
    .click-particle{position:fixed;pointer-events:none;z-index:999;font-family:'Space Mono',monospace;font-weight:700;font-size:0.9rem;color:var(--accent3);animation:floatUp 0.9s ease-out forwards;}
    @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-70px) scale(0.6);}}

    /* BUILDINGS */
    .building-item{display:flex;align-items:center;gap:0.65rem;padding:0.6rem 0.75rem;border-radius:10px;border:1px solid var(--border);background:var(--surface);margin-bottom:0.35rem;cursor:pointer;transition:all 0.15s;min-height:56px;}
    .building-item.can-buy{border-color:var(--accent);}
    .building-item.can-buy:active{background:rgba(124,58,237,0.12);transform:scale(0.98);}
    .building-item.too-exp{opacity:0.32;cursor:not-allowed;}
    .building-emoji{font-size:1.4rem;flex-shrink:0;}
    .building-info{flex:1;min-width:0;}
    .building-name{font-size:0.8rem;font-weight:700;}
    .building-cps{font-family:'Space Mono',monospace;font-size:0.59rem;color:var(--accent2);}
    .building-cost{font-family:'Space Mono',monospace;font-size:0.62rem;color:var(--accent);}
    .building-right{display:flex;flex-direction:column;align-items:flex-end;gap:0.3rem;flex-shrink:0;}
    .building-owned{font-family:'Space Mono',monospace;font-size:0.9rem;font-weight:700;color:var(--accent3);min-width:24px;text-align:right;}
    .minigame-btn{font-size:0.55rem;font-family:'Space Mono',monospace;padding:0.15rem 0.4rem;border-radius:4px;border:1px solid #a855f7;color:#a855f7;background:transparent;cursor:pointer;white-space:nowrap;transition:all 0.15s;}
    .minigame-btn:hover{background:rgba(168,85,247,0.15);}
    .minigame-btn.locked{border-color:var(--muted);color:var(--muted);cursor:not-allowed;}

    /* REBIRTH SHOP ITEMS */
    .rs-item{display:flex;align-items:center;gap:0.65rem;padding:0.75rem;border-radius:10px;border:1px solid var(--border);background:var(--surface);margin-bottom:0.35rem;cursor:pointer;transition:all 0.15s;min-height:60px;}
    .rs-item.can-buy{border-color:#a855f7;}
    .rs-item.can-buy:active{background:rgba(168,85,247,0.12);transform:scale(0.98);}
    .rs-item.bought{opacity:0.35;cursor:default;border-color:var(--green);}
    .rs-item.too-exp{opacity:0.4;cursor:not-allowed;}
    .rs-emoji{font-size:1.5rem;flex-shrink:0;}
    .rs-info{flex:1;min-width:0;}
    .rs-name{font-size:0.82rem;font-weight:700;}
    .rs-desc{font-family:'Space Mono',monospace;font-size:0.6rem;color:var(--muted);}
    .rs-cost{font-family:'Space Mono',monospace;font-size:0.65rem;color:#a855f7;margin-top:0.15rem;}
    .rs-owned{font-family:'Space Mono',monospace;font-size:0.8rem;font-weight:700;color:#a855f7;flex-shrink:0;}

    /* MOBILE TABS */
    .mobile-tabs{position:relative;z-index:100;display:flex;flex-shrink:0;height:var(--tab-h);background:rgba(10,10,15,0.97);border-top:1px solid var(--border);}
    .mob-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.15rem;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:color 0.2s;font-family:'Space Mono',monospace;font-size:0.54rem;letter-spacing:0.03em;padding-bottom:env(safe-area-inset-bottom,0);}
    .mob-tab .tab-icon{font-size:1.2rem;line-height:1;}
    .mob-tab.active{color:var(--accent3);}
    .mob-tab.active .tab-icon{filter:drop-shadow(0 0 6px var(--accent3));}

    /* TOAST */
    .toast{position:fixed;bottom:calc(var(--tab-h) + 0.75rem);left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0.6rem 1.25rem;font-family:'Space Mono',monospace;font-size:0.72rem;z-index:998;transition:transform 0.3s,opacity 0.3s;opacity:0;white-space:nowrap;max-width:92vw;}
    @media(min-width:768px){.toast{bottom:1.5rem;}}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

    /* LOGIN BANNER */
    .login-banner{position:relative;z-index:60;flex-shrink:0;background:linear-gradient(135deg,rgba(124,58,237,0.92),rgba(6,182,212,0.92));backdrop-filter:blur(10px);padding:0.6rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:0.75rem;}
    .login-banner p{font-family:'Space Mono',monospace;font-size:0.68rem;}
    .login-banner a{padding:0.4rem 0.9rem;background:#fff;color:#111;border-radius:6px;font-family:'Space Mono',monospace;font-size:0.68rem;font-weight:700;text-decoration:none;white-space:nowrap;flex-shrink:0;}
    #login-banner-wrap{flex-shrink:0;}

    /* GOLDEN COOKIE */
    .golden-cookie{position:fixed;cursor:pointer;z-index:200;font-size:2.5rem;filter:drop-shadow(0 0 15px gold);display:none;animation:goldenFloat 10s ease-in-out forwards;}
    @keyframes goldenFloat{0%{opacity:0;transform:scale(0);}10%{opacity:1;transform:scale(1) rotate(-10deg);}90%{opacity:1;transform:scale(1) rotate(10deg);}100%{opacity:0;transform:scale(0);}}

    /* MODALS */
    .modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s;}
    @media(min-width:768px){.modal-overlay{align-items:center;}}
    .modal-overlay.open{opacity:1;pointer-events:all;}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;transform:translateY(60px);transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);}
    @media(min-width:768px){.modal{border-radius:20px;width:min(640px,96vw);max-height:85vh;}}
    .modal-overlay.open .modal{transform:translateY(0);}
    .modal-handle{width:40px;height:4px;border-radius:2px;background:var(--border);margin:0.75rem auto 0;flex-shrink:0;}
    @media(min-width:768px){.modal-handle{display:none;}}
    .modal-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem 0.75rem;border-bottom:1px solid var(--border);flex-shrink:0;}
    .modal-title{font-size:1.2rem;font-weight:800;display:flex;align-items:center;gap:0.6rem;}
    .modal-close{width:32px;height:32px;border-radius:50%;background:transparent;border:1px solid var(--border);color:var(--muted);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
    .modal-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
    .modal-tab{flex:1;padding:0.6rem 0.25rem;text-align:center;font-family:'Space Mono',monospace;font-size:0.63rem;cursor:pointer;color:var(--muted);border:none;background:transparent;transition:all 0.2s;}
    .modal-tab.active{color:var(--accent3);border-bottom:2px solid var(--accent3);}
    .modal-body{overflow-y:auto;flex:1;padding:0.75rem 1rem 1rem;-webkit-overflow-scrolling:touch;}
    .modal-body::-webkit-scrollbar{width:3px;}
    .modal-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

    /* LEADERBOARD */
    .lb-row{display:grid;grid-template-columns:30px 1fr 95px 85px;align-items:center;gap:0.5rem;padding:0.6rem 0.5rem;border-radius:10px;margin-bottom:0.3rem;}
    @media(max-width:380px){.lb-row{grid-template-columns:26px 1fr 75px;}.lb-val-sec{display:none;}}
    .lb-row:hover{background:rgba(255,255,255,0.03);}
    .lb-row.lb-me{background:rgba(124,58,237,0.12);border:1px solid rgba(124,58,237,0.25);}
    .lb-row.lb-header{color:var(--muted);font-family:'Space Mono',monospace;font-size:0.56rem;letter-spacing:0.12em;text-transform:uppercase;padding-bottom:0.4rem;margin-bottom:0.2rem;border-bottom:1px solid var(--border);}
    .lb-rank{font-family:'Space Mono',monospace;font-size:0.82rem;font-weight:700;text-align:center;}
    .lb-rank-1{color:#eab308;}.lb-rank-2{color:#94a3b8;}.lb-rank-3{color:#b45309;}
    .lb-user{display:flex;align-items:center;gap:0.45rem;min-width:0;}
    .lb-avatar{width:24px;height:24px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:700;}
    .lb-username{font-weight:700;font-size:0.78rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .lb-you{font-family:'Space Mono',monospace;font-size:0.52rem;color:var(--accent);margin-left:0.2rem;}
    .lb-val{font-family:'Space Mono',monospace;font-size:0.72rem;color:var(--accent3);text-align:right;}
    .lb-val-sec{font-family:'Space Mono',monospace;font-size:0.72rem;color:var(--accent2);text-align:right;}
    .lb-empty{text-align:center;padding:2.5rem 1rem;font-family:'Space Mono',monospace;font-size:0.78rem;color:var(--muted);}
    .lb-meta{display:flex;align-items:center;justify-content:space-between;padding:0.5rem 0.75rem 0.75rem;font-family:'Space Mono',monospace;font-size:0.6rem;color:var(--muted);}
    .lb-refresh-btn{background:transparent;border:1px solid var(--border);border-radius:6px;padding:0.28rem 0.65rem;color:var(--muted);font-family:'Space Mono',monospace;font-size:0.6rem;cursor:pointer;transition:all 0.2s;}
    .lb-refresh-btn:hover{color:var(--accent2);border-color:var(--accent2);}

    /* REBIRTH MODAL */
    .rebirth-preview{background:var(--bg);border:1px solid rgba(168,85,247,0.4);border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
    .rebirth-stat{display:flex;justify-content:space-between;padding:0.4rem 0;border-bottom:1px solid var(--border);font-family:'Space Mono',monospace;font-size:0.75rem;}
    .rebirth-stat:last-child{border-bottom:none;}
    .rebirth-stat-val{color:#a855f7;font-weight:700;}
    .rebirth-warning{font-family:'Space Mono',monospace;font-size:0.72rem;color:var(--red);margin-bottom:1rem;line-height:1.6;}
    .rebirth-confirm-btn{width:100%;padding:0.85rem;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;border:none;border-radius:10px;font-family:'Space Mono',monospace;font-size:0.88rem;font-weight:700;cursor:pointer;transition:all 0.2s;box-shadow:0 0 30px rgba(168,85,247,0.4);}
    .rebirth-confirm-btn:hover{transform:translateY(-2px);box-shadow:0 0 50px rgba(168,85,247,0.6);}

    /* MINIGAME MODAL */
    .minigame-container{padding:0.5rem;}
    .mg-title{font-size:1rem;font-weight:800;margin-bottom:0.5rem;}
    .mg-desc{font-family:'Space Mono',monospace;font-size:0.72rem;color:var(--muted);margin-bottom:1rem;line-height:1.6;}
    /* Click rush */
    .mg-clickrush{text-align:center;}
    .mg-big-btn{width:120px;height:120px;border-radius:50%;border:none;font-size:3rem;cursor:pointer;background:radial-gradient(circle at 35% 35%,#7c3aed,#4c1d95);box-shadow:0 0 40px rgba(124,58,237,0.5);transition:transform 0.06s;touch-action:manipulation;}
    .mg-big-btn:active{transform:scale(0.88);}
    .mg-timer{font-family:'Space Mono',monospace;font-size:2rem;font-weight:700;color:var(--accent3);margin:0.5rem 0;}
    .mg-score{font-family:'Space Mono',monospace;font-size:0.9rem;color:var(--accent2);}
    .mg-start-btn{padding:0.65rem 1.5rem;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:'Space Mono',monospace;font-size:0.82rem;cursor:pointer;transition:all 0.2s;margin-top:0.75rem;}
    .mg-start-btn:hover{background:#6d28d9;}
    /* Number guess */
    .mg-guess input{width:100%;padding:0.75rem;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Space Mono',monospace;font-size:1rem;outline:none;margin-bottom:0.75rem;}
    .mg-guess input:focus{border-color:var(--accent);}
    .mg-feedback{font-family:'Space Mono',monospace;font-size:0.82rem;margin-bottom:0.5rem;min-height:1.2rem;}
    .mg-attempts{font-family:'Space Mono',monospace;font-size:0.7rem;color:var(--muted);}
    /* Memory */
    .mg-memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0.5rem;max-width:280px;margin:0 auto;}
    .mg-card{height:60px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.5rem;transition:all 0.2s;-webkit-user-select:none;}
    .mg-card.revealed{background:rgba(6,182,212,0.15);border-color:var(--accent2);}
    .mg-card.matched{background:rgba(34,197,94,0.15);border-color:var(--green);cursor:default;}
    /* Snake */
    #snake-canvas{border:2px solid var(--border);border-radius:8px;display:block;margin:0 auto;touch-action:none;}
    .mg-controls{display:flex;flex-direction:column;align-items:center;gap:0.3rem;margin-top:0.5rem;}
    .mg-ctrl-row{display:flex;gap:0.3rem;}
    .mg-ctrl-btn{width:42px;height:42px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
    .mg-ctrl-btn:active{background:rgba(124,58,237,0.2);}

    body.prestige .cookie-btn{animation:prestigeGlow 2s ease infinite;}
    @keyframes prestigeGlow{0%,100%{box-shadow:0 0 40px rgba(217,119,6,0.4);}50%{box-shadow:0 0 80px rgba(217,119,6,0.9),0 0 120px rgba(124,58,237,0.5);}}
    footer{display:none;}
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">AXO<span>BOYS</span></a>
  <div class="nav-right">
    <span class="save-indicator" id="save-indicator">✓ Sauvé</span>
    <span class="rebirth-badge" id="rebirth-badge">🌀 R0</span>
    <a href="profile.html" id="nav-user-link">Mon profil</a>
    <a href="index.html">Hub</a>
  </div>
</nav>

<div id="login-banner-wrap"></div>

<div class="game-wrapper">
  <!-- LEFT: UPGRADES -->

async function dbGet(col, id) {
  try { const s = await getDoc(doc(_db, col, id)); return s.exists() ? s.data() : null; }
  catch(e) { console.error('dbGet', col, id, e); return null; }
}
async function dbSet(col, id, val) {
  try { await setDoc(doc(_db, col, id), val); return true; }
  catch(e) { console.error('dbSet', col, id, e); return false; }
}
async function dbListAll(col) {
  try { const snap = await getDocs(collection(_db, col)); return snap.docs.map(d => d.data()); }
  catch(e) { console.error('dbListAll', col, e); return []; }
}

function simpleHash(str) {
  let h = 5381;
  for (let i = 0; i < str.length; i++) h = ((h << 5) + h) ^ str.charCodeAt(i);
  return (h >>> 0).toString(16);
}

async function initGame() {
  const saved = await dbGet('saves', userKey);
  if (saved) loadFromSave(saved);

}

function loadFromSave(saved) {
  state.cookies       = saved.cookies       || 0;
  state.totalCookies  = saved.totalCookies  || 0;
  state.totalClicks   = saved.totalClicks   || 0;
  state.rebirths      = saved.rebirths      || 0;
  state.rebirthPoints = saved.rebirthPoints || 0;
  state.rebirthShop   = saved.rebirthShop   || {};
  state.minigameUnlocks= saved.minigameUnlocks || {};
  if (saved.buildings) Object.assign(state.buildings, saved.buildings);
  if (saved.upgrades)  Object.assign(state.upgrades, saved.upgrades);
  recomputeMultipliers();
}

function getStateToSave() {
  return {
    username: currentUser,
    cookies: state.cookies, totalCookies: state.totalCookies,
    totalClicks: state.totalClicks, cps: computeCps(),
    buildings: {...state.buildings}, upgrades: {...state.upgrades},
    rebirths: state.rebirths, rebirthPoints: state.rebirthPoints,
    rebirthShop: {...state.rebirthShop},
    minigameUnlocks: {...state.minigameUnlocks},
    lastSave: Date.now(),
  };
}

// ====================================================
// GAME LOGIC
// ====================================================
function recomputeMultipliers() {
  state.clickMult=1; state.globalMult=1;
  BUILDINGS.forEach(b => state.buildingMult[b.id]=1);
  UPGRADES.forEach(u => {
    if (!state.upgrades[u.id]) return;
    if (u.effect==='click')    state.clickMult *= u.mult;
    if (u.effect==='global')   state.globalMult *= u.mult;
    if (u.effect==='building') state.buildingMult[u.bid] = (state.buildingMult[u.bid]||1) * u.mult;
  });
  // Rebirth shop bonuses
  state.rebirthClickBonus  = 1;
  state.rebirthGlobalBonus = 1;
  REBIRTH_ITEMS.forEach(item => {
    if (!state.rebirthShop[item.id]) return;
    if (item.effect==='clickMult')  state.rebirthClickBonus  *= item.val;
    if (item.effect==='globalMult') state.rebirthGlobalBonus *= item.val;
  });
}

function getBuildingCost(b) { return Math.ceil(b.baseCost * Math.pow(1.15, state.buildings[b.id]||0)); }

function computeCps() {
  let cps=0;
  BUILDINGS.forEach(b => cps += (state.buildings[b.id]||0) * b.baseCps * (state.buildingMult[b.id]||1));
  // Rebirth global bonus = +50% per rebirth level
  const rebirthBonus = 1 + (state.rebirths * 0.5);
  return cps * state.globalMult * rebirthBonus * state.rebirthGlobalBonus;
}

function getClickValue() {
  const rebirthBonus = 1 + (state.rebirths * 0.5);
  return Math.max(1, computeCps()*0.01) * state.clickMult * rebirthBonus * state.rebirthClickBonus;
}

function getRebirthPointsEarned() {
  // 1 point per 100M cookies totaux, min 1
  return Math.max(1, Math.floor(state.totalCookies / 1e8));
}

function handleClick(cx, cy) {
  const val = getClickValue();
  state.cookies += val; state.totalCookies += val; state.totalClicks++;
  spawnParticle(cx, cy, '+' + formatNum(val));
  updateDisplay();
}

cookieBtn.addEventListener('click', e => handleClick(e.clientX, e.clientY));
cookieBtn.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) handleClick(t.clientX, t.clientY);
}, {passive:false});

function spawnParticle(x, y, text) {
  const el = document.createElement('div');
  el.className = 'click-particle'; el.textContent = text;
  el.style.left = (x - 15 + (Math.random()-0.5)*30) + 'px';
  el.style.top  = (y - 10) + 'px';
  document.body.appendChild(el); setTimeout(() => el.remove(), 900);
}

// ====================================================
// BUY
// ====================================================
function buyBuilding(id) {
  const b = BUILDINGS.find(x=>x.id===id); if(!b) return;
  const cost = getBuildingCost(b); if(state.cookies < cost) return;
  state.cookies -= cost; state.buildings[id] = (state.buildings[id]||0)+1;
  showToast(b.emoji + ' ' + b.name + ' acheté !'); updateDisplay();
}

function buyUpgrade(id) {
  const u = UPGRADES.find(x=>x.id===id); if(!u||state.upgrades[id]) return;
  if(state.cookies < u.cost) return;
  state.cookies -= u.cost; state.upgrades[id]=true;
  recomputeMultipliers();
  showToast(u.emoji + ' ' + u.name + ' débloqué !'); updateDisplay();
}

window.buyRebirthItem = function(id) {
  const item = REBIRTH_ITEMS.find(x=>x.id===id); if(!item) return;
  if(state.rebirthShop[id]) return; // already bought
  if(state.rebirthPoints < item.cost) { showToast('❌ Pas assez de points rebirth !'); return; }
  state.rebirthPoints -= item.cost;
  state.rebirthShop[id] = true;
  if (item.effect === 'minigame') state.minigameUnlocks[item.bid] = true;
  recomputeMultipliers();
  showToast(item.emoji + ' ' + item.name + ' acheté !');
  renderRebirthShop(); updateDisplay();
}

function getRebirthRequirement() {
  return Math.pow(10, 9 + state.rebirths); // 1B, 10B, 100B...
}

        <div class="rebirth-stat"><span>Ta progression</span><span class="rebirth-stat-val" style="color:${canRebirth?'#22c55e':'#f97316'};">${formatNum(state.totalCookies)} (${progress}%)</span></div>
        <div class="rebirth-stat"><span>Points gagnés</span><span class="rebirth-stat-val">${canRebirth?'+'+pts+' pts':'—'}</span></div>

window.doRebirth = function() {
  if (state.totalCookies < getRebirthRequirement()) { showToast('❌ Prérequis non atteint !'); return; }
  const pts = getRebirthPointsEarned();
  state.rebirthPoints += pts;
  state.rebirths++;
  state.cookies = 0; state.totalClicks = 0;
  state.buildings = {}; state.upgrades = {};
  BUILDINGS.forEach(b => { state.buildings[b.id] = 0; state.buildingMult[b.id] = 1; });
  REBIRTH_ITEMS.forEach(item => {
    if (!state.rebirthShop[item.id]) return;
    if (item.effect === 'startBonus') state.buildings[item.bid] = (state.buildings[item.bid]||0) + item.val;
  });
  recomputeMultipliers();
  closeModal('rebirth');
  saveGame(true);
  updateDisplay();
  showToast('🌀 Rebirth #' + state.rebirths + ' effectué ! +' + pts + ' points');
}

function formatNum(n){
  n=Math.floor(n);
  if(n>=1e15)return(n/1e15).toFixed(2)+' Qa';
  if(n>=1e12)return(n/1e12).toFixed(2)+' T';
  if(n>=1e9) return(n/1e9).toFixed(2)+' B';
  if(n>=1e6) return(n/1e6).toFixed(2)+' M';
  if(n>=1e3) return(n/1e3).toFixed(1)+' K';
  return n.toString();
}

function updateDisplay(){
  const cps=computeCps();
  document.getElementById('cookie-count').textContent=formatNum(state.cookies);
  document.getElementById('cps-display').textContent=formatNum(cps)+'/sec';
  document.getElementById('click-stats').textContent='🖱 '+state.totalClicks.toLocaleString('fr')+' clics • ⚡ +'+formatNum(getClickValue())+'/tap';
  const rb=document.getElementById('rebirth-badge');
  rb.style.display=state.rebirths>0?'inline':'none';
  rb.textContent='🌀 R'+state.rebirths;
  const rInfo=document.getElementById('rebirth-info');
  if(state.rebirths>0){rInfo.style.display='block';rInfo.textContent='🌀 Bonus rebirth: +'+(state.rebirths*50)+'% production';}
  else rInfo.style.display='none';
  let bldTotal=0;Object.values(state.buildings).forEach(v=>bldTotal+=v||0);
  document.getElementById('bld-total').textContent=bldTotal+' total';
  const boughtUpg=UPGRADES.filter(u=>state.upgrades[u.id]).length;
  document.getElementById('upg-count').textContent=boughtUpg+'/'+UPGRADES.length;
  renderBuildings();renderUpgrades();updateTabDots();
}

function updateTabDots(){

  if(!bldBuilt)buildBuildingDOM();

    const realCps=b.baseCps*(state.buildingMult[b.id]||1)*state.globalMult*(1+state.rebirths*0.5)*state.rebirthGlobalBonus;

function renderUpgrades(){

function renderNumberGuess(body,bid){
  let target=Math.floor(Math.random()*100)+1,attempts=0,maxA=7,won=false;
  body.innerHTML=`<div class="minigame-container mg-guess">
    <div class="mg-title">🔢 Devinette</div>
    <div class="mg-desc">Devine le nombre entre 1 et 100 en ${maxA} essais !</div>
    <input type="number" id="ng-input" min="1" max="100" placeholder="Ton nombre..." onkeydown="if(event.key==='Enter')ngGuess()">
    <div class="mg-feedback" id="ng-feedback"></div>
    <div class="mg-attempts" id="ng-attempts">Essais restants : ${maxA}</div>
    <button class="mg-start-btn" onclick="ngGuess()">Valider</button>
    <button class="mg-start-btn" style="margin-left:0.5rem;background:var(--surface);border:1px solid var(--border);" onclick="ngReset(${bid})">↺ Nouveau</button>
  </div>`;
  window._ngState={target,attempts,maxA,won,bid};
}
window.ngGuess=function(){
  const s=window._ngState;if(!s||s.won)return;
  const val=parseInt(document.getElementById('ng-input').value);
  if(isNaN(val)||val<1||val>100){document.getElementById('ng-feedback').textContent='Entre un nombre entre 1 et 100 !';return;}
  s.attempts++;
  const rem=s.maxA-s.attempts;
  if(val===s.target){
    s.won=true;
    document.getElementById('ng-feedback').textContent='🎉 Gagné en '+s.attempts+' essais !';
    document.getElementById('ng-feedback').style.color='var(--green)';
    mgReward(s.bid,(s.maxA-s.attempts+1)*50);
  } else if(rem<=0){
    document.getElementById('ng-feedback').textContent='❌ C\'était '+s.target+' !';
    document.getElementById('ng-feedback').style.color='var(--red)';
    document.getElementById('ng-attempts').textContent='Game over';
  } else {
    document.getElementById('ng-feedback').textContent=val<s.target?'📈 Plus grand !':'📉 Plus petit !';
    document.getElementById('ng-feedback').style.color='var(--accent3)';
    document.getElementById('ng-attempts').textContent='Essais restants : '+rem;
  }
  document.getElementById('ng-input').value='';
};
window.ngReset=function(){renderNumberGuess(document.getElementById('mg-body'),window._ngState.bid);};

// --- MEMORY ---
function renderMemory(body,bid){
  const emojis=['🍪','🎮','🌟','⚡','🦎','🎯','🔥','💎'];
  const pairs=[...emojis,...emojis].sort(()=>Math.random()-0.5);
  let revealed=[],matched=[],attempts=0;
  body.innerHTML=`<div class="minigame-container">
    <div class="mg-title">🃏 Mémoire</div>
    <div class="mg-desc">Trouve toutes les paires !</div>
    <div class="mg-memory-grid" id="mem-grid"></div>
    <div style="font-family:'Space Mono',monospace;font-size:0.72rem;color:var(--muted);text-align:center;margin-top:0.75rem;" id="mem-info">0 paires trouvées</div>
  </div>`;
  const grid=document.getElementById('mem-grid');
  window._memState={pairs,revealed:[],matched:[],attempts:0,locked:false,bid};
  pairs.forEach((_,i)=>{
    const card=document.createElement('div');card.className='mg-card';card.id='mc-'+i;
    card.textContent='?';
    card.onclick=()=>memFlip(i);
    grid.appendChild(card);
  });
}
window.memFlip=function(i){
  const s=window._memState;
  if(s.locked||s.matched.includes(i)||s.revealed.includes(i))return;
  s.revealed.push(i);
  document.getElementById('mc-'+i).textContent=s.pairs[i];
  document.getElementById('mc-'+i).classList.add('revealed');
  if(s.revealed.length===2){
    s.locked=true;s.attempts++;
    const[a,b]=s.revealed;
    if(s.pairs[a]===s.pairs[b]){
      s.matched.push(a,b);
      [a,b].forEach(x=>{document.getElementById('mc-'+x).classList.add('matched');document.getElementById('mc-'+x).classList.remove('revealed');});
      s.revealed=[];s.locked=false;
      document.getElementById('mem-info').textContent=(s.matched.length/2)+'/'+8+' paires';
      if(s.matched.length===s.pairs.length){mgReward(s.bid,Math.max(1,100-s.attempts*5));document.getElementById('mem-info').textContent='🎉 Gagné !';}
    } else {
      setTimeout(()=>{
        [a,b].forEach(x=>{document.getElementById('mc-'+x).textContent='?';document.getElementById('mc-'+x).classList.remove('revealed');});
        s.revealed=[];s.locked=false;
      },800);
    }
  }
};

  </div>`;
  window._snakeState={size:SIZE,cell:CELL,snake:[{x:7,y:7}],dir:{x:1,y:0},food:snakePlaceFood(SIZE),score:0,running:false,bid};

}
window.snakePlaceFood=function(s){return{x:Math.floor(Math.random()*s),y:Math.floor(Math.random()*s)};};
window.snakeDir=function(x,y){const s=window._snakeState;if(!s||!s.running)return;if(s.dir.x===-x&&s.dir.y===-y)return;s.dir={x,y};};
window.snakeStart=function(){
  const s=window._snakeState;if(!s)return;
  s.snake=[{x:7,y:7}];s.dir={x:1,y:0};s.score=0;s.running=true;s.food=snakePlaceFood(s.size);
  document.getElementById('snake-start').style.display='none';
  if(snakeInterval)clearInterval(snakeInterval);
  snakeInterval=setInterval(snakeTick,150);
};
window.snakeTick=function(){
  const s=window._snakeState;if(!s||!s.running)return;
  const head={x:s.snake[0].x+s.dir.x,y:s.snake[0].y+s.dir.y};
  if(head.x<0||head.x>=s.size||head.y<0||head.y>=s.size||s.snake.some(seg=>seg.x===head.x&&seg.y===head.y)){
    s.running=false;clearInterval(snakeInterval);
    mgReward(s.bid,s.score*30);
    document.getElementById('snake-score').textContent='Game over ! Score : '+s.score;
    document.getElementById('snake-start').textContent='↺ Rejouer';
    document.getElementById('snake-start').style.display='inline-block';
    return;
  }
  s.snake.unshift(head);
  if(head.x===s.food.x&&head.y===s.food.y){s.score++;s.food=snakePlaceFood(s.size);document.getElementById('snake-score').textContent='Score : '+s.score;}
  else s.snake.pop();
  snakeDraw();
};
window.snakeDraw=function(){
  const s=window._snakeState;const cvs=document.getElementById('snake-canvas');if(!cvs||!s)return;
  const ctx=cvs.getContext('2d');const{size:SZ,cell:C}=s;
  ctx.fillStyle='#0a0a0f';ctx.fillRect(0,0,SZ*C,SZ*C);
  ctx.strokeStyle='#1e1e2e';ctx.lineWidth=0.5;
  for(let i=0;i<SZ;i++)for(let j=0;j<SZ;j++){ctx.strokeRect(i*C,j*C,C,C);}
  ctx.fillStyle='#ef4444';ctx.fillRect(s.food.x*C+2,s.food.y*C+2,C-4,C-4);
  s.snake.forEach((seg,i)=>{ctx.fillStyle=i===0?'#7c3aed':'#a855f7';ctx.fillRect(seg.x*C+1,seg.y*C+1,C-2,C-2);});
};
// Touch swipe for snake
let touchStart={x:0,y:0};
document.addEventListener('touchstart',e=>{if(!window._snakeState?.running)return;touchStart={x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:true});
document.addEventListener('touchend',e=>{
  if(!window._snakeState?.running)return;
  const dx=e.changedTouches[0].clientX-touchStart.x,dy=e.changedTouches[0].clientY-touchStart.y;
  if(Math.abs(dx)>Math.abs(dy)){snakeDir(dx>0?1:-1,0);}else{snakeDir(0,dy>0?1:-1);}
},{passive:true});

// Keyboard arrow keys for snake
document.addEventListener('keydown',e=>{
  if(window._snakeState?.running){
    if(e.key==='ArrowUp'){e.preventDefault();snakeDir(0,-1);}
    else if(e.key==='ArrowDown'){e.preventDefault();snakeDir(0,1);}
    else if(e.key==='ArrowLeft'){e.preventDefault();snakeDir(-1,0);}
    else if(e.key==='ArrowRight'){e.preventDefault();snakeDir(1,0);}
  }
  if(e.key===' '&&e.target.tagName!=='INPUT'){e.preventDefault();const r=cookieBtn.getBoundingClientRect();handleClick(r.left+r.width/2,r.top+r.height/2);}
  if(e.key==='s'&&(e.ctrlKey||e.metaKey)){e.preventDefault();saveGame();}
  if(e.key==='Escape'){['lb','rebirth','rshop','mg'].forEach(id=>closeModal(id));stopMinigame();}
});

// ====================================================
// TOAST & RESET
// ====================================================
let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}

window.confirmReset = function(){
  if(confirm('🗑 Tout remettre à zéro ? (progression ET rebirths)')){
    state.cookies=0;state.totalCookies=0;state.totalClicks=0;
    BUILDINGS.forEach(b=>state.buildings[b.id]=0);
    state.upgrades={};state.rebirths=0;state.rebirthPoints=0;state.rebirthShop={};state.minigameUnlocks={};
    recomputeMultipliers();saveGame(true);updateDisplay();
    showToast('Progression complètement remise à zéro.');
  }
}

// ====================================================
// INIT
// ====================================================
updateDisplay();

// Recharge depuis Firebase quand l'onglet redevient visible
// (utile après une modif admin ou retour depuis une autre page)
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && currentUser) {
    const saved = await dbGet('saves', userKey);
    if (saved) {
      loadFromSave(saved);
      updateDisplay();
    }
  }
});
</script>
